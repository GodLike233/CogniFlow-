<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CogniFlow AI 对话</title>
    <script>
function renderMarkdown(text){
    if(!text) return '';
    var html = text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/### (.+)/g,'<h3>$1</h3>')
        .replace(/## (.+)/g,'<h2>$1</h2>')
        .replace(/# (.+)/g,'<h1>$1</h1>')
        .replace(/- (.+)/g,'<li>$1</li>')
        .replace(/\n\n/g,'</p><p>')
        .replace(/\n/g,'<br>');
    html = '<p>'+html+'</p>';
    html = html.replace(/<li>[\s\S]*?<\/li>/g,function(m){return '<ul style="padding-left:20px;margin:6px 0">'+m+'</ul>';});
    return html;
}
</script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0f0c29;--text:#e8e8e8;--text-dim:rgba(255,255,255,0.5);--accent:#a78bfa;--accent2:#7c3aed;--topbar-bg:rgba(0,0,0,0.3);--chat-bg:rgba(255,255,255,0.03);--chat-border:rgba(255,255,255,0.08);--bubble-user:rgba(167,139,250,0.2);--bubble-ai:rgba(255,255,255,0.06);--input-bg:rgba(255,255,255,0.06);--day-bg:rgba(255,255,255,0.04);--tooltip-bg:#1a1a2e;--btn-text:#e0e0e0;--topbar-text:rgba(255,255,255,0.8)}
        .light{--bg:#f0f4ff;--text:#0a0a14;--text-dim:rgba(0,0,0,0.6);--accent:#6d28d9;--accent2:#5b21b6;--topbar-bg:rgba(255,255,255,0.85);--chat-bg:rgba(255,255,255,0.7);--chat-border:rgba(124,58,237,0.15);--bubble-user:rgba(109,40,217,0.12);--bubble-ai:rgba(255,255,255,0.92);--input-bg:rgba(0,0,0,0.04);--day-bg:rgba(255,255,255,0.75);--tooltip-bg:#f0f0f0;--btn-text:#1a1a2e;--topbar-text:rgba(0,0,0,0.75)}
        body{
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
            background:linear-gradient(160deg,var(--bg) 0%,var(--bg) 30%,var(--bg) 60%,var(--bg) 100%);
            min-height:100vh;color:var(--text);line-height:1.6;transition:background .6s,color .3s;
            animation:pageIn .5s ease;
        }
        @keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
        @keyframes gradientFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 28px;background:var(--topbar-bg);border-bottom:1px solid var(--chat-border);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
        .topbar .brand{font-size:20px;font-weight:700;background:linear-gradient(135deg,#a78bfa,#60a5fa,#8b5cf6,#a78bfa);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradientFlow 4s ease infinite}
        .topbar .right{display:flex;align-items:center;gap:12px}
        .user-menu{position:relative;display:flex;align-items:center}
        .user-menu .uname{font-size:13px;color:var(--topbar-text);cursor:pointer;padding:4px 10px;border-radius:8px;transition:.3s}
        .user-menu .uname:hover{background:rgba(255,255,255,0.1);color:var(--text)}
        .user-menu .dropdown{display:none;position:absolute;top:100%;right:0;background:var(--tooltip-bg);border:1px solid var(--chat-border);border-radius:10px;padding:4px;min-width:100px;z-index:10}
        .user-menu:hover .dropdown{display:block;animation:fadeDown .2s ease}
        .user-menu .dropdown button{display:block;width:100%;text-align:left;padding:8px 14px;background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;border-radius:6px}
        .user-menu .dropdown button:hover{background:rgba(255,255,255,0.08);color:var(--text)}
        .theme-btn{border-radius:50%!important;width:34px;height:34px;padding:0!important;font-size:16px;display:flex!important;align-items:center;justify-content:center}
        .nav-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:var(--btn-text);padding:7px 16px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .3s}
        .nav-btn:hover{background:rgba(255,255,255,0.15);color:var(--text);transform:translateY(-1px)}
        .nav-btn.accent{background:rgba(167,139,250,0.2);border-color:rgba(167,139,250,0.4);color:#c4b5fd}
        .nav-btn.accent:hover{background:rgba(167,139,250,0.35);color:#fff}

        .main{max-width:860px;margin:0 auto;padding:20px;animation:fadeUp .5s .1s both}
        .chat-section{background:var(--chat-bg);border:1px solid var(--chat-border);border-radius:20px;overflow:hidden}
        .chat-header{padding:14px 22px;border-bottom:1px solid var(--chat-border);display:flex;align-items:center;gap:10px;background:var(--topbar-bg)}
        .chat-header .dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        .chat-header span{font-size:14px;color:var(--text-dim);font-weight:500}

        .roadmap{padding:0 22px 14px;border-bottom:1px solid var(--chat-border);background:var(--topbar-bg);display:none}
        .roadmap-header{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
        .roadmap-header span{font-size:14px;color:var(--accent);font-weight:600}
        .btn-sm{padding:5px 14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#ccc;border-radius:12px;font-size:11px;cursor:pointer;transition:.3s;white-space:nowrap}
        .btn-sm:hover{background:rgba(255,255,255,0.15)}
        .roadmap-days{display:flex;gap:7px;overflow-x:auto;padding:6px 0;scroll-behavior:smooth}
        .roadmap-days.expanded{flex-wrap:wrap}
        .roadmap-days::-webkit-scrollbar{height:4px}
        .roadmap-days::-webkit-scrollbar-thumb{background:rgba(167,139,250,0.3);border-radius:2px}
        .day-node{
            min-width:96px;max-width:130px;padding:10px;background:var(--day-bg);
            border:1px solid var(--chat-border);border-radius:12px;cursor:default;
            text-align:center;transition:.3s;flex-shrink:0;position:relative;
        }
        .day-node .day-num{font-size:17px;font-weight:700;color:var(--accent)}
        .day-node .day-label{font-size:10px;color:var(--text-dim);margin-top:3px;max-height:26px;overflow:hidden;line-height:1.3}
        .day-node .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);margin:5px auto 0;opacity:.4}
        .day-node .tooltip{display:none;position:absolute;bottom:calc(100%+8px);left:50%;transform:translateX(-50%);background:var(--tooltip-bg);border:1px solid rgba(167,139,250,0.3);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--text-dim);white-space:nowrap;z-index:10;pointer-events:none}
        .day-node:hover .tooltip{display:block}

        .save-hint{display:none;padding:8px 22px;background:rgba(167,139,250,0.08);border-bottom:1px solid rgba(167,139,250,0.15);text-align:center;animation:flash 2s infinite}
        @keyframes flash{0%,100%{opacity:1}50%{opacity:.5}}
        .save-hint span{font-size:12px;color:#c4b5fd;cursor:pointer}
        .save-hint span:hover{text-decoration:underline}

        .chat-messages{max-height:500px;overflow-y:auto;padding:18px 22px;scroll-behavior:smooth}
        .chat-messages::-webkit-scrollbar{width:6px}
        .chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
        .msg{margin-bottom:18px;animation:fadeIn .3s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .msg.user{display:flex;justify-content:flex-end}
        .msg.user .bubble{background:var(--bubble-user);border:1px solid rgba(167,139,250,0.25);border-radius:18px 18px 4px 18px;max-width:80%}
        .msg.assistant .bubble{background:var(--bubble-ai);border:1px solid var(--chat-border);border-radius:18px 18px 18px 4px;max-width:85%}
        .bubble{padding:14px 18px;font-size:14px;line-height:1.7}
        .bubble p{margin:8px 0}
        .bubble h1,.bubble h2,.bubble h3,.bubble h4{color:var(--accent);margin:12px 0 8px;font-weight:600;text-decoration:none!important;border-bottom:1px solid rgba(167,139,250,0.2);padding-bottom:4px}
        .bubble h1{font-size:20px}.bubble h2{font-size:17px}.bubble h3{font-size:15px}.bubble h4{font-size:14px}
        .bubble a{text-decoration:none;color:var(--accent)}
        .bubble ul,.bubble ol{padding-left:20px;margin:8px 0}
        .bubble li{margin:5px 0}
        .bubble pre{background:rgba(0,0,0,0.2);border:1px solid var(--chat-border);border-radius:8px;padding:14px;overflow-x:auto;margin:10px 0}
        .bubble strong{color:var(--text);font-weight:600}
        .bubble blockquote{border-left:3px solid var(--accent);padding-left:14px;color:var(--text-dim);margin:8px 0}
        .bubble hr{border:none;border-top:1px solid var(--chat-border);margin:14px 0}
        .empty-state{text-align:center;padding:50px 20px;color:var(--text-dim)}
        .empty-state .big{font-size:48px;margin-bottom:12px}
        .empty-state p{font-size:14px}
        .chat-input-area{padding:14px 22px;display:flex;gap:10px;border-top:1px solid var(--chat-border);background:var(--topbar-bg)}
        .chat-input-area textarea{flex:1;padding:12px 16px;background:var(--input-bg);border:1px solid var(--chat-border);border-radius:12px;color:var(--text);font-size:14px;resize:none;outline:none;font-family:inherit;min-height:44px;max-height:120px}
        .chat-input-area textarea:focus{border-color:var(--accent)}
        .btn-send{padding:12px 24px;background:linear-gradient(135deg,#a78bfa,#6366f1);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:.3s;white-space:nowrap}
        .btn-send:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(99,102,241,0.3)}
        .btn-send:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .typing-indicator{display:flex;gap:5px;padding:10px 18px}
        .typing-indicator span{width:7px;height:7px;border-radius:50%;background:rgba(167,139,250,0.6);animation:bounce 1.4s infinite ease-in-out}
        .typing-indicator span:nth-child(1){animation-delay:0s}.typing-indicator span:nth-child(2){animation-delay:.15s}.typing-indicator span:nth-child(3){animation-delay:.3s}
        @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
        @media(max-width:768px){.chat-messages{max-height:350px}}
    </style>
</head>
<body>
<div class="topbar">
    <div class="brand" style="cursor:pointer" onclick="location.href='/welcome'">✦ CogniFlow AI</div>
    <div class="right">
        <button class="theme-btn" onclick="toggleTheme()">🌙</button>
        <button class="nav-btn" onclick="location.href='/'">🏠 主页</button>
        <button class="nav-btn" onclick="location.href='/courses'">📚 课程</button>
        <button class="nav-btn" onclick="location.href='/exam'">📝 考试</button>
        <button class="nav-btn" onclick="location.href='/plans'">📋 我的计划</button>
        <div class="user-menu">
            <span class="uname" id="userName">未登录</span>
            <div class="dropdown"><button onclick="location.href='/profile'">👤 个人信息</button><button onclick="logout()">退出登录</button></div>
        </div>
    </div>
</div>

<div class="main">
    <div class="chat-section">
        <div class="chat-header">
            <span class="dot"></span>
            <span id="chatStatus">CogniFlow AI · 随时聊、随时问</span>
        </div>

        <div class="save-hint" id="saveHint">
            <span onclick="saveCurrentPlan()">💡 路线图已生成，审阅后点击这里保存到「我的计划」</span>
        </div>

        <div class="roadmap" id="roadmap">
            <div class="roadmap-header">
                <span id="roadmapTitle">📋 学习路线图</span>
                <button class="btn-sm" id="expandBtn" onclick="toggleRoadmapDetail()">展开详情</button>
            </div>
            <div class="roadmap-days" id="roadmapDays"></div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="empty-state" id="emptyState">
                <div class="big">💬</div>
                <p>和 CogniFlow 聊聊你想学什么吧！<br>点击「＋ 新建计划」从主页选择一个挑战开始</p>
            </div>
        </div>
        <div class="chat-input-area">
            <textarea id="chatInput" placeholder="输入你想学的内容，或者问任何问题..." rows="1"></textarea>
            <button class="btn-send" id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>
</div>

<script>
const user = JSON.parse(localStorage.getItem('cf_user')||'{}');
if(!user.userId) window.location.replace('/login');
document.getElementById('userName').textContent = user.username;

let waiting = false;
let currentPlanDays = [];
let lastPlanContent = '';
let lastPlanTitle = '';
let lastPlanType = '';
let roadmapExpanded = false;

let isDark = localStorage.getItem('cf_theme') !== 'light';
function applyTheme(){document.body.classList.toggle('light',!isDark);document.querySelector('.theme-btn').textContent=isDark?'🌙':'☀️'}
function toggleTheme(){isDark=!isDark;localStorage.setItem('cf_theme',isDark?'dark':'light');applyTheme()}
applyTheme();

document.getElementById('chatInput').addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}
});

function parsePlanDays(content){
    const days=[];
    const lines=content.split('\n');
    for(let line of lines){
        let clean=line.replace(/^\*\*|\*\*$/g,'').replace(/^[\s\-•*]+/,'').trim();
        let m=clean.match(/^Day\s*(\d+)[：:]\s*(.+)/);
        if(m){
            let label=m[2].trim().replace(/\*+$/g,'').trim();
            if(label) days.push({day:parseInt(m[1]),label:label.substring(0,60)});
        }
    }
    return days;
}

function renderRoadmap(content){
    const days=parsePlanDays(content);
    if(days.length===0) return;
    lastPlanContent=content;
    currentPlanDays=days;
    const container=document.getElementById('roadmapDays');
    container.className='roadmap-days';
    container.innerHTML=days.map((d,i)=>{
        const tip=d.label.length>15?`<div class="tooltip">${d.label}</div>`:'';
        return `<div class="day-node">
            <div class="day-num">Day ${d.day}</div>
            <div class="day-label">${d.label}</div>
            <div class="dot"></div>
            ${tip}
        </div>`;
    }).join('');
    document.getElementById('roadmap').style.display='block';
    document.getElementById('roadmapTitle').textContent='📋 学习路线图 ('+days.length+'天)';
    document.getElementById('saveHint').style.display='block';
    document.getElementById('chatStatus').textContent='CogniFlow AI · 路线图已生成，请审阅';
    setTimeout(()=>{document.getElementById('roadmapDays').scrollLeft=0},100);
}

function toggleRoadmapDetail(){
    roadmapExpanded=!roadmapExpanded;
    const container=document.getElementById('roadmapDays');
    if(roadmapExpanded){container.classList.add('expanded');document.getElementById('expandBtn').textContent='收起'}
    else{container.classList.remove('expanded');document.getElementById('expandBtn').textContent='展开详情'}
}

async function saveCurrentPlan(){
    if(!lastPlanContent) return;
    const title=lastPlanTitle||(currentPlanDays.length>0?currentPlanDays[0]?.label?.substring(0,30)+'...':'AI学习计划')||'学习计划';
    const planType=lastPlanType||'challenge21';
    const totalDays=currentPlanDays.length>0?currentPlanDays.length:(lastPlanContent.match(/Day\s*\d+/gi)||[]).length||1;
    try{
        const res=await fetch('/api/plans',{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({userId:user.userId,title:title,planType:planType,content:lastPlanContent,totalDays:totalDays})
        });
        const plan=await res.json();
        if(res.ok){
            localStorage.setItem('cf_last_plan_id',plan.id);
            document.getElementById('saveHint').style.display='none';
            window.location.href='/plan-detail/'+plan.id;
        }else{
            alert(plan.message||'保存失败');
        }
    }catch(e){alert('保存失败: '+e.message)}
}

async function sendMessage(){
    const inp=document.getElementById('chatInput');
    const text=inp.value.trim();
    if(!text||waiting) return;
    inp.value='';
    document.getElementById('emptyState').style.display='none';
    appendMsg('user',text,false);
    waiting=true;
    document.getElementById('sendBtn').disabled=true;
    const typing=document.createElement('div');
    typing.className='msg assistant';
    typing.innerHTML='<div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
    document.getElementById('chatMessages').appendChild(typing);
    document.getElementById('chatMessages').scrollTop=document.getElementById('chatMessages').scrollHeight;
    try{
        const res=await fetch('/api/chat/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:user.userId,message:text})});
        const data=await res.json();
        typing.remove();
        appendMsg('assistant',data.reply,true);
        lastPlanContent=data.reply;
        const days=parsePlanDays(data.reply);
        if(days.length>=5) renderRoadmap(data.reply);
        else document.getElementById('saveHint').style.display='block';
    }catch(e){typing.remove();appendMsg('assistant','抱歉，出了点问题：'+e.message,true)}
    finally{waiting=false;document.getElementById('sendBtn').disabled=false;document.getElementById('chatInput').focus()}
}

function appendMsg(role,content,isMd){
    const div=document.createElement('div');
    div.className='msg '+role;
    const bubble=document.createElement('div');
    bubble.className='bubble';
    if(isMd&&role==='assistant') bubble.innerHTML=renderMarkdown(content);
    else bubble.textContent=content;
    div.appendChild(bubble);
    document.getElementById('chatMessages').appendChild(div);
    document.getElementById('chatMessages').scrollTop=document.getElementById('chatMessages').scrollHeight;
}

function logout(){localStorage.removeItem('cf_user');localStorage.removeItem('cf_theme');window.location.href='/login'}
function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

(async function(){
    try{
        const res=await fetch('/api/chat/history?userId='+user.userId);
        const data=await res.json();
        if(data.length>0){
            document.getElementById('emptyState').style.display='none';
            data.forEach(m=>appendMsg(m.role,m.content,m.role==='assistant'));
            document.getElementById('chatMessages').scrollTop=document.getElementById('chatMessages').scrollHeight
        }
        const pending=JSON.parse(localStorage.getItem('cf_plan')||'null');
        if(pending){
            localStorage.removeItem('cf_plan');
            lastPlanType=pending.planType;
            lastPlanTitle=pending.topic||'';
            document.getElementById('chatInput').value=pending.fullMsg||'';
            document.getElementById('chatInput').focus();
            setTimeout(()=>sendMessage(),400);
        }
    }catch(e){}
})();
</script>
</body>
</html>
