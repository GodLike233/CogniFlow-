<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的计划 - CogniFlow</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0f0c29;--text:#e8e8e8;--text-dim:rgba(255,255,255,0.5);--card-bg:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.08);--accent:#a78bfa;--accent2:#7c3aed;--btn-text:#e0e0e0;--topbar-text:rgba(255,255,255,0.8);--topbar-bg:rgba(0,0,0,0.2);--dropdown-bg:#1a1a2e;--gold:#f59e0b}
        .light{--bg:#f0f4ff;--text:#0a0a14;--text-dim:rgba(0,0,0,0.6);--card-bg:rgba(255,255,255,0.8);--card-border:rgba(124,58,237,0.15);--accent:#6d28d9;--accent2:#5b21b6;--btn-text:#1a1a2e;--topbar-text:rgba(0,0,0,0.75);--topbar-bg:rgba(255,255,255,0.85);--dropdown-bg:#f0f0f0;--gold:#d97706}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(160deg,var(--bg) 0%,var(--bg) 30%,var(--bg) 60%,var(--bg) 100%);min-height:100vh;color:var(--text);transition:background .6s,color .3s;animation:pageIn .5s ease}
        @keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
        @keyframes gradientFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 28px;background:var(--topbar-bg);border-bottom:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
        .topbar .brand{font-size:20px;font-weight:700;background:linear-gradient(135deg,#a78bfa,#60a5fa,#8b5cf6,#a78bfa);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradientFlow 4s ease infinite}
        .topbar .right{display:flex;align-items:center;gap:12px}
        .user-menu{position:relative;display:flex;align-items:center}
        .user-menu .uname{font-size:13px;color:var(--topbar-text);cursor:pointer;padding:4px 10px;border-radius:8px;transition:.3s}
        .user-menu .uname:hover{background:rgba(255,255,255,0.1);color:var(--text)}
        .user-menu .dropdown{display:none;position:absolute;top:100%;right:0;background:var(--dropdown-bg);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:4px;min-width:100px;z-index:10}
        .user-menu:hover .dropdown{display:block;animation:fadeDown .2s ease}
        .user-menu .dropdown button{display:block;width:100%;text-align:left;padding:8px 14px;background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;border-radius:6px}
        .user-menu .dropdown button:hover{background:rgba(255,255,255,0.08);color:var(--text)}
        .theme-btn{border-radius:50%!important;width:34px;height:34px;padding:0!important;font-size:16px;display:flex!important;align-items:center;justify-content:center}
        .nav-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:var(--btn-text);padding:7px 16px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .3s}
        .nav-btn:hover{background:rgba(255,255,255,0.15);color:var(--text);transform:translateY(-1px)}
        .nav-btn.active{background:rgba(167,139,250,0.2);border-color:rgba(167,139,250,0.4);color:#c4b5fd}

        .main{max-width:700px;margin:0 auto;padding:30px 20px 60px;animation:fadeUp .5s .1s both}
        .main h2{font-size:22px;color:var(--accent);margin-bottom:24px}
        .plan-item{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:18px 20px;margin-bottom:14px;transition:.3s;display:flex;justify-content:space-between;align-items:center}
        .plan-item:hover{border-color:rgba(167,139,250,0.35);transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,0.15)}
        .plan-item.all-done{border-color:rgba(245,158,11,0.25)}
        .plan-info{flex:1;cursor:pointer}
        .plan-info .t{font-size:15px;color:var(--text);font-weight:600;margin-bottom:4px}
        .plan-item.all-done .t{color:var(--gold)}
        .plan-info .meta{font-size:11px;color:var(--text-dim)}
        .plan-stats{text-align:right;margin-right:16px}
        .plan-stats .pct{font-size:22px;font-weight:700;color:var(--accent)}
        .plan-item.all-done .pct{color:var(--gold)}
        .plan-stats .days{font-size:11px;color:var(--text-dim)}
        .progress-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:8px;width:100%}
        .progress-bar div{height:100%;border-radius:2px;background:linear-gradient(90deg,#a78bfa,#6366f1)}
        .plan-item.all-done .progress-bar div{background:linear-gradient(90deg,#f59e0b,#d97706)}
        .delete-btn{background:none;border:none;color:rgba(255,255,255,0.2);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:.3s}
        .delete-btn:hover{color:#f87171;background:rgba(248,113,113,0.1)}
        .empty{padding:60px 20px;text-align:center;color:var(--text-dim)}
        .empty .big{font-size:48px;margin-bottom:14px}
        .empty p{font-size:14px;margin-bottom:16px}
        .empty button{background:rgba(167,139,250,0.2);border:1px solid rgba(167,139,250,0.4);color:#c4b5fd;padding:10px 24px;border-radius:20px;font-size:14px;cursor:pointer}
        .empty button:hover{background:rgba(167,139,250,0.35);color:#fff}
    </style>
</head>
<body>
<div class="topbar">
    <div class="brand" style="cursor:pointer" onclick="location.href='/welcome'">✦ CogniFlow</div>
    <div class="right">
        <button class="theme-btn" onclick="toggleTheme()">🌙</button>
        <button class="nav-btn" onclick="location.href='/'">🏠 主页</button>
        <button class="nav-btn" onclick="location.href='/courses'">📚 课程</button>
        <button class="nav-btn" onclick="location.href='/exam'">📝 考试</button>
        <button class="nav-btn active">📋 我的计划</button>
        <div class="user-menu">
            <span class="uname" id="userName">未登录</span>
            <div class="dropdown"><button onclick="location.href='/profile'">👤 个人信息</button><button onclick="logout()">退出登录</button></div>
        </div>
    </div>
</div>

<div class="main">
    <h2>📋 我的学习计划</h2>
    <div id="planList"></div>
</div>

<script>
const user = JSON.parse(localStorage.getItem('cf_user')||'{}');
if(!user.userId) window.location.replace('/login');
document.getElementById('userName').textContent = user.username;

let isDark = localStorage.getItem('cf_theme') !== 'light';
function applyTheme(){document.body.classList.toggle('light',!isDark);document.querySelector('.theme-btn').textContent=isDark?'🌙':'☀️'}
function toggleTheme(){isDark=!isDark;localStorage.setItem('cf_theme',isDark?'dark':'light');applyTheme()}
applyTheme();

function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

async function loadPlans(){
    const container=document.getElementById('planList');
    try{
        const plans=await fetch('/api/plans/user/'+user.userId).then(r=>r.json());
        if(!plans||plans.length===0){
            container.innerHTML=`<div class="empty">
                <div class="big">📭</div>
                <p>还没有学习计划</p>
                <button onclick="location.href='/planning'">＋ 去创建一个</button>
            </div>`;
            return;
        }
        container.innerHTML=plans.map(p=>{
            const progress=p.progressDays||0;
            const total=p.totalDays||0;
            const pct=total>0?Math.round(progress/total*100):0;
            const allDone=pct>=100;
            return `<div class="plan-item ${allDone?'all-done':''}">
                <div class="plan-info" onclick="location.href='/plan-detail/${p.id}'">
                    <div class="t">${escapeHtml(p.title)}${allDone?' 🏆':''}</div>
                    <div class="meta">${p.planType||''} · 创建于 ${(p.createdAt||'').substring(0,10)}</div>
                    <div class="progress-bar"><div style="width:${pct}%"></div></div>
                </div>
                <div class="plan-stats" onclick="location.href='/plan-detail/${p.id}'" style="cursor:pointer">
                    <div class="pct">${pct}%</div>
                    <div class="days">${progress}/${total}天</div>
                </div>
                <button class="delete-btn" data-id="${p.id}" data-title="${p.title.replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}" onclick="event.stopPropagation();deletePlan(this)" title="删除">🗑</button>
            </div>`;
        }).join('');
    }catch(e){container.innerHTML='<p style="color:#f87171">加载失败</p>';}
}

async function deletePlan(btn){
    const id=btn.dataset.id;
    const title=btn.dataset.title;
    if(!confirm('确定删除「'+title+'」？此操作不可恢复。')) return;
    try{await fetch('/api/plans/'+id,{method:'DELETE'});loadPlans()}catch(e){alert('删除失败')}
}

function logout(){localStorage.removeItem('cf_user');localStorage.removeItem('cf_theme');window.location.href='/login'}
loadPlans();
</script>
</body>
</html>
