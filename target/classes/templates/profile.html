<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - CogniFlow</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0f0c29;--text:#e8e8e8;--text-dim:rgba(255,255,255,0.5);--card-bg:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.08);--accent:#a78bfa;--topbar-bg:rgba(0,0,0,0.2);--topbar-text:rgba(255,255,255,0.8);--btn-text:#e0e0e0;--dropdown-bg:#1a1a2e;--input-bg:rgba(255,255,255,0.06);--success:#22c55e}
        .light{--bg:#f0f4ff;--text:#0a0a14;--text-dim:rgba(0,0,0,0.6);--card-bg:rgba(255,255,255,0.8);--card-border:rgba(124,58,237,0.15);--accent:#6d28d9;--topbar-bg:rgba(255,255,255,0.85);--topbar-text:rgba(0,0,0,0.75);--btn-text:#1a1a2e;--dropdown-bg:#f0f0f0;--input-bg:rgba(0,0,0,0.04);--success:#16a34a}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(160deg,var(--bg) 0%,var(--bg) 30%,var(--bg) 60%,var(--bg) 100%);min-height:100vh;color:var(--text);transition:background .6s,color .3s;animation:pageIn .5s ease}
        @keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
        .topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 28px;background:var(--topbar-bg);border-bottom:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
        .topbar .brand{font-size:20px;font-weight:700;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .topbar .right{display:flex;align-items:center;gap:12px}
        .user-menu{position:relative;display:flex;align-items:center}
        .user-menu .uname{font-size:13px;color:var(--topbar-text);cursor:pointer;padding:4px 10px;border-radius:8px}
        .user-menu:hover .uname{background:rgba(255,255,255,0.1)}
        .user-menu .dropdown{display:none;position:absolute;top:100%;right:0;background:var(--dropdown-bg);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:4px;min-width:130px;z-index:10}
        .user-menu:hover .dropdown{display:block;animation:fadeDown .2s ease}
        .user-menu .dropdown button{display:block;width:100%;text-align:left;padding:8px 14px;background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;border-radius:6px}
        .user-menu .dropdown button:hover{background:rgba(255,255,255,0.08);color:var(--text)}
        .theme-btn{border-radius:50%;width:34px;height:34px;padding:0;font-size:16px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);cursor:pointer;color:var(--btn-text)}
        .nav-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:var(--btn-text);padding:7px 16px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .3s}
        .nav-btn:hover{background:rgba(255,255,255,0.15);color:var(--text);transform:translateY(-1px)}
        .nav-btn.active{background:rgba(167,139,250,0.2);border-color:rgba(167,139,250,0.4);color:#c4b5fd}

        .main{max-width:480px;margin:0 auto;padding:30px 20px 60px;animation:fadeUp .5s .1s both}
        .profile-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:18px;padding:32px}
        .profile-card .avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#6366f1);display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;margin:0 auto 20px}
        .profile-card h2{text-align:center;font-size:20px;margin-bottom:4px}
        .profile-card .role-tag{text-align:center;font-size:12px;color:var(--accent);margin-bottom:24px}
        .field{margin-bottom:16px}
        .field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:4px}
        .field input{width:100%;padding:10px 14px;background:var(--input-bg);border:1px solid var(--card-border);border-radius:10px;color:var(--text);font-size:14px;outline:none;font-family:inherit}
        .field input:focus{border-color:var(--accent)}
        .field input[readonly]{opacity:.6;cursor:not-allowed}
        .btn-save{width:100%;padding:12px;background:linear-gradient(135deg,#a78bfa,#6366f1);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:.3s;margin-top:8px}
        .btn-save:hover{box-shadow:0 8px 24px rgba(99,102,241,0.3);transform:translateY(-1px)}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
        .toast.show{opacity:1}
    </style>
</head>
<body>
<div class="topbar">
    <div class="brand" style="cursor:pointer" onclick="location.href='/welcome'">✦ CogniFlow</div>
    <div class="right">
        <button class="theme-btn" onclick="toggleTheme()">🌙</button>
        <button class="nav-btn" onclick="location.href='/'">🏠 主页</button>
        <button class="nav-btn" onclick="location.href='/courses'">📚 课程</button>
        <button class="nav-btn" onclick="location.href='/exam'">📝 考试</button>
        <button class="nav-btn" onclick="location.href='/plans'">📋 我的计划</button>
        <div class="user-menu">
            <span class="uname" id="userName">未登录</span>
            <div class="dropdown"><button onclick="logout()">退出登录</button></div>
        </div>
    </div>
</div>

<div class="main">
    <div class="profile-card">
        <div class="avatar" id="avatarIcon">👤</div>
        <h2 id="displayName">加载中...</h2>
        <div class="role-tag" id="displayRole"></div>
        <div class="field">
            <label>用户名</label>
            <input type="text" id="fieldUsername" readonly>
        </div>
        <div class="field">
            <label>邮箱</label>
            <input type="text" id="fieldEmail" placeholder="未设置">
        </div>
        <div class="field">
            <label>新密码（不修改则留空）</label>
            <input type="text" id="fieldPassword" placeholder="留空则不修改密码">
        </div>
        <button class="btn-save" onclick="saveProfile()">💾 保存修改</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const user = JSON.parse(localStorage.getItem('cf_user')||'{}');
if(!user.userId) window.location.replace('/login');
document.getElementById('userName').textContent = user.username;

let isDark = localStorage.getItem('cf_theme') !== 'light';
function applyTheme(){document.body.classList.toggle('light',!isDark);document.querySelector('.theme-btn').textContent=isDark?'🌙':'☀️'}
function toggleTheme(){isDark=!isDark;localStorage.setItem('cf_theme',isDark?'dark':'light');applyTheme()}
applyTheme();

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000)}

async function loadProfile(){
    try{
        const data = await fetch('/api/user/'+user.userId).then(r=>r.json());
        document.getElementById('displayName').textContent=data.username;
        document.getElementById('displayRole').textContent=data.role==='ADMIN'?'⚙️ 管理员':'🎓 学生';
        document.getElementById('fieldUsername').value=data.username;
        document.getElementById('fieldEmail').value=data.email||'';
    }catch(e){document.getElementById('displayName').textContent='加载失败'}
}
loadProfile();

async function saveProfile(){
    const email=document.getElementById('fieldEmail').value.trim();
    const password=document.getElementById('fieldPassword').value.trim();
    try{
        const res=await fetch('/api/user/'+user.userId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})}).then(r=>r.json());
        if(res.message){
            user.email=email;
            localStorage.setItem('cf_user',JSON.stringify(user));
            toast('保存成功');
        }
    }catch(e){toast('保存失败')}
}

function logout(){localStorage.removeItem('cf_user');window.location.href='/login'}
</script>
</body>
</html>
