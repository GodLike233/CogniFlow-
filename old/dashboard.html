<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CogniFlow 控制台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5; min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px 28px; color: white;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { font-size: 20px; }
        .header .user-info { font-size: 13px; opacity: 0.9; }
        .header .user-info button {
            margin-left: 12px; background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.5); color: white;
            padding: 6px 16px; border-radius: 14px; cursor: pointer; font-size: 13px;
        }
        .container { max-width: 1200px; margin: 24px auto; padding: 0 20px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .card {
            background: white; border-radius: 12px; padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .card h3 { font-size: 16px; color: #333; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; color: #666; }
        .stat-row .val { color: #333; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #f0f0f0; }
        th { color: #999; font-weight: 500; }
        td { color: #333; }
        .btn {
            padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: #667eea; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .tabs { display: flex; gap: 0; margin-bottom: 20px; }
        .tabs button {
            padding: 10px 24px; border: none; background: white; cursor: pointer;
            font-size: 14px; color: #666; border-bottom: 2px solid transparent;
        }
        .tabs button.active { color: #667eea; border-bottom-color: #667eea; font-weight: 600; }
        .modal-bg {
            display: none; position: fixed; top:0;left:0;width:100%;height:100%;
            background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center;
        }
        .modal {
            background: white; border-radius: 12px; padding: 28px; width: 420px; max-height: 80vh; overflow-y: auto;
        }
        .modal h3 { margin-bottom: 20px; }
        .modal .form-group { margin-bottom: 14px; }
        .modal .form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
        .modal .form-group input, .modal .form-group textarea, .modal .form-group select {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px;
        }
        .modal .form-group textarea { resize: vertical; min-height: 60px; }
        .tree-item { padding: 4px 0 4px 20px; font-size: 13px; color: #333; }
        .tree-item .dot { color: #667eea; font-weight: bold; margin-right: 4px; }
        .chat-section { width:100%; margin-top: 20px; }
    </style>
</head>
<body>
<div class="header">
    <h1>CogniFlow 智流学习导航</h1>
    <div class="user-info">
        <span id="displayUser">未登录</span>
        <button onclick="logout()">退出</button>
    </div>
</div>
<div class="container">
    <div class="tabs">
        <button class="active" onclick="switchPanel('plans', this)">📋 我的计划</button>
        <button onclick="switchPanel('overview', this)">总览</button>
        <button onclick="switchPanel('courses', this)">课程管理</button>
        <button onclick="switchPanel('knowledge', this)">知识点树</button>
        <button onclick="switchPanel('records', this)">学习记录</button>
        <button onclick="switchPanel('chat', this)">AI问答</button>
    </div>

    <div id="panel-plans">
        <div class="card">
            <h3>📋 我的学习计划</h3>
            <div id="dashboardPlansList"></div>
        </div>
    </div>

    <div id="panel-overview" style="display:none">
        <div class="cards">
            <div class="card">
                <h3>📚 平台概览</h3>
                <div class="stat-row"><span>课程总数</span><span class="val" id="statCourses">-</span></div>
                <div class="stat-row"><span>知识点总数</span><span class="val" id="statKps">-</span></div>
                <div class="stat-row"><span>学习记录数</span><span class="val" id="statRecords">-</span></div>
            </div>
            <div class="card">
                <h3>📊 我的学习统计</h3>
                <div class="stat-row"><span>总学习时长(分钟)</span><span class="val" id="statTime">-</span></div>
                <div class="stat-row"><span>平均得分</span><span class="val" id="statAvg">-</span></div>
                <div class="stat-row"><span>通过率</span><span class="val" id="statPass">-</span></div>
            </div>
        </div>
    </div>

    <div id="panel-courses" style="display:none">
        <div class="card" style="width:100%">
            <h3>
                课程列表
                <button class="btn btn-primary" style="float:right" onclick="openCourseModal()">+ 新增课程</button>
            </h3>
            <table id="courseTable">
                <thead><tr><th>ID</th><th>名称</th><th>分类</th><th>描述</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="panel-knowledge" style="display:none">
        <div style="margin-bottom:16px">
            <label>选择课程: </label>
            <select id="kpCourseSelect" onchange="loadKnowledgePoints()" style="padding:8px;border-radius:6px;font-size:14px"></select>
            <button class="btn btn-primary btn-sm" style="margin-left:10px" onclick="openKpModal()">+ 新增知识点</button>
        </div>
        <div class="card"><div id="treeContainer"></div></div>
    </div>

    <div id="panel-records" style="display:none">
        <div style="margin-bottom:16px">
            <label>用户ID: </label>
            <input type="number" id="recordUserId" value="2" onchange="loadRecords()" style="width:80px;padding:6px;border-radius:6px;border:1px solid #ddd">
            <button class="btn btn-primary btn-sm" style="margin-left:10px" onclick="loadRecords()">查询</button>
            <button class="btn btn-primary btn-sm" style="margin-left:10px" onclick="calcStatistics()">统计</button>
        </div>
        <div class="card"><table id="recordTable"><thead><tr><th>ID</th><th>知识点</th><th>状态</th><th>得分</th><th>时长(分)</th><th>时间</th></tr></thead><tbody></tbody></table></div>
    </div>

    <div id="panel-chat" style="display:none">
        <div class="card chat-section">
            <h3>💬 AI 智能问答</h3>
            <div id="chatMessages" style="max-height:350px;overflow-y:auto;margin-bottom:12px"></div>
            <div style="display:flex;gap:8px">
                <input type="text" id="chatInput" placeholder="向豆包大模型提问..." style="flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;">
                <button class="btn btn-primary" onclick="sendChat()">发送</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-bg" id="courseModal">
    <div class="modal">
        <h3 id="courseModalTitle">新增课程</h3>
        <input type="hidden" id="courseEditId">
        <div class="form-group"><label>课程名称</label><input type="text" id="courseName"></div>
        <div class="form-group"><label>分类</label><input type="text" id="courseCategory"></div>
        <div class="form-group"><label>描述</label><textarea id="courseDesc"></textarea></div>
        <button class="btn btn-primary" onclick="saveCourse()">保存</button>
        <button class="btn" style="margin-left:8px" onclick="closeModal('courseModal')">取消</button>
    </div>
</div>

<div class="modal-bg" id="kpModal">
    <div class="modal">
        <h3 id="kpModalTitle">新增知识点</h3>
        <input type="hidden" id="kpEditId">
        <div class="form-group"><label>知识点名称</label><input type="text" id="kpName"></div>
        <div class="form-group"><label>描述</label><textarea id="kpDesc"></textarea></div>
        <div class="form-group"><label>难度</label><select id="kpDifficulty"><option>入门</option><option>进阶</option><option>高阶</option></select></div>
        <div class="form-group"><label>排序序号</label><input type="number" id="kpOrder" value="1"></div>
        <button class="btn btn-primary" onclick="saveKp()">保存</button>
        <button class="btn" style="margin-left:8px" onclick="closeModal('kpModal')">取消</button>
    </div>
</div>

<script>
    let userInfo = JSON.parse(localStorage.getItem('cogniflow_user') || '{}');
    if (!userInfo.userId) window.location.href = '/login';
    document.getElementById('displayUser').textContent = userInfo.username + ' (' + (userInfo.roleDisplay||'') + ')';

    function logout() { localStorage.removeItem('cogniflow_user'); window.location.href = '/login'; }

    function switchPanel(name, btn) {
        document.querySelectorAll('[id^="panel-"]').forEach(p => p.style.display = 'none');
        document.getElementById('panel-' + name).style.display = 'block';
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        if (name === 'plans') loadDashboardPlans();
        if (name === 'overview') loadOverview();
        if (name === 'courses') loadCourses();
        if (name === 'knowledge') { loadCourseSelect(); loadKnowledgePoints(); }
        if (name === 'records') loadRecords();
        if (name === 'chat') loadChatHistory();
    }

    async function loadDashboardPlans() {
        const user = JSON.parse(localStorage.getItem('cf_user')||'{}');
        if (!user.userId) return;
        try {
            const plans = await fetch('/api/plans/user/' + user.userId).then(r=>r.json());
            const list = document.getElementById('dashboardPlansList');
            if (!plans || plans.length === 0) {
                list.innerHTML = '<p style="color:#999;text-align:center;padding:40px">还没有保存的计划，去首页生成一个吧 📚</p>';
                return;
            }
            list.innerHTML = plans.map(p => {
                const days = (p.content.match(/^Day\s*\d+[：:]/gm)||[]).length;
                const total = p.totalDays || days;
                const progress = p.progressDays || 0;
                const pct = total > 0 ? Math.round(progress/total*100) : 0;
                return `<div style="border:1px solid #eee;border-radius:10px;padding:16px;margin-bottom:12px;cursor:pointer" onclick="window.open('/','_blank')">
                    <div style="display:flex;justify-content:space-between;align-items:center">
                        <div><strong>${p.title}</strong><br><span style="font-size:12px;color:#999">${p.planType||''} · ${(p.createdAt||'').substring(0,10)}</span></div>
                        <div style="text-align:right"><span style="font-size:22px;font-weight:700;color:#667eea">${pct}%</span><br><span style="font-size:12px;color:#999">${progress}/${total}天</span></div>
                    </div>
                    <div style="height:4px;background:#f0f0f0;border-radius:2px;margin-top:10px"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:2px"></div></div>
                </div>`;
            }).join('');
        } catch(e) { document.getElementById('dashboardPlansList').innerHTML = '<p style="color:red">加载失败</p>'; }
    }

    async function loadOverview() {
        const [cs, kps, recs] = await Promise.all([
            fetch('/api/courses').then(r=>r.json()),
            fetch('/api/knowledge-points/course/1').then(r=>r.json()),
            fetch('/api/study-records/user/' + userInfo.userId + '/statistics').then(r=>r.json())
        ]);
        document.getElementById('statCourses').textContent = cs.length;
        document.getElementById('statKps').textContent = '...';
        document.getElementById('statRecords').textContent = recs.totalRecords || 0;
        document.getElementById('statTime').textContent = recs.totalTimeSpent || 0;
        document.getElementById('statAvg').textContent = recs.averageScore || 0;
        document.getElementById('statPass').textContent = (recs.passRate || 0) + '%';
        let totalKps = 0;
        for (let c of cs) {
            const kps = await fetch('/api/knowledge-points/course/' + c.id).then(r=>r.json());
            totalKps += kps.length;
        }
        document.getElementById('statKps').textContent = totalKps;
    }

    async function loadCourses() {
        const courses = await fetch('/api/courses').then(r=>r.json());
        const tbody = document.querySelector('#courseTable tbody');
        tbody.innerHTML = courses.map(c => `<tr>
            <td>${c.id}</td><td>${escapeHtml(c.name)}</td><td>${escapeHtml(c.category||'')}</td>
            <td>${escapeHtml((c.description||'').substring(0,30))}</td>
            <td>
                <button class="btn btn-primary btn-sm" onclick="editCourse(${c.id})">编辑</button>
                <button class="btn btn-danger btn-sm" onclick="deleteCourse(${c.id})">删除</button>
            </td></tr>`).join('');
    }

    async function loadCourseSelect() {
        const courses = await fetch('/api/courses').then(r=>r.json());
        const sel = document.getElementById('kpCourseSelect');
        sel.innerHTML = courses.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }

    async function loadKnowledgePoints() {
        const courseId = document.getElementById('kpCourseSelect').value;
        const tree = await fetch('/api/knowledge-points/tree/' + courseId).then(r=>r.json());
        document.getElementById('treeContainer').innerHTML = renderTree(tree);
    }

    function renderTree(nodes, depth) {
        if (!nodes || nodes.length === 0) return '<p style="color:#999">暂无知识点</p>';
        depth = depth || 0;
        let html = '';
        for (let n of nodes) {
            html += `<div class="tree-item">
                <span class="dot">●</span> <strong>${escapeHtml(n.name)}</strong>
                <span style="color:#999;margin-left:8px;font-size:12px">[${n.difficulty||''}]</span>
                <span style="color:#999;margin-left:8px;font-size:12px">${escapeHtml((n.description||'').substring(0,40))}</span>
            </div>`;
            if (n.children && n.children.length > 0) {
                html += `<div style="margin-left:28px">${renderTree(n.children, depth+1)}</div>`;
            }
        }
        return html;
    }

    async function loadRecords() {
        const uid = document.getElementById('recordUserId').value;
        const records = await fetch('/api/study-records/user/' + uid).then(r=>r.json());
        const tbody = document.querySelector('#recordTable tbody');
        tbody.innerHTML = records.map(r => `<tr>
            <td>${r.id}</td><td>${r.knowledgePoint?.name||r.knowledgePoint?.id||'-'}</td>
            <td>${r.status}</td><td>${r.score!=null?r.score:'-'}</td><td>${r.timeSpent||'-'}</td>
            <td>${r.createdAt?r.createdAt.substring(0,16):''}</td>
        </tr>`).join('');
    }

    async function calcStatistics() {
        const uid = document.getElementById('recordUserId').value;
        const stats = await fetch('/api/study-records/user/' + uid + '/statistics').then(r=>r.json());
        alert('均分: ' + stats.averageScore + ', 通过率: ' + stats.passRate + '%, 不及格数: ' + stats.failedCount);
    }

    function openCourseModal() {
        document.getElementById('courseEditId').value = '';
        document.getElementById('courseModalTitle').textContent = '新增课程';
        document.getElementById('courseName').value = '';
        document.getElementById('courseCategory').value = '';
        document.getElementById('courseDesc').value = '';
        document.getElementById('courseModal').style.display = 'flex';
    }

    async function editCourse(id) {
        const c = await fetch('/api/courses/' + id).then(r=>r.json());
        document.getElementById('courseEditId').value = id;
        document.getElementById('courseModalTitle').textContent = '编辑课程';
        document.getElementById('courseName').value = c.name;
        document.getElementById('courseCategory').value = c.category||'';
        document.getElementById('courseDesc').value = c.description||'';
        document.getElementById('courseModal').style.display = 'flex';
    }

    async function saveCourse() {
        const id = document.getElementById('courseEditId').value;
        const body = {
            name: document.getElementById('courseName').value,
            category: document.getElementById('courseCategory').value,
            description: document.getElementById('courseDesc').value
        };
        const url = id ? '/api/courses/' + id : '/api/courses';
        const method = id ? 'PUT' : 'POST';
        await fetch(url, {method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
        closeModal('courseModal');
        loadCourses();
    }

    async function deleteCourse(id) {
        if (!confirm('确定删除该课程？')) return;
        await fetch('/api/courses/' + id, {method:'DELETE'});
        loadCourses();
    }

    function openKpModal() {
        document.getElementById('kpEditId').value = '';
        document.getElementById('kpModalTitle').textContent = '新增知识点';
        document.getElementById('kpName').value = '';
        document.getElementById('kpDesc').value = '';
        document.getElementById('kpDifficulty').value = '入门';
        document.getElementById('kpOrder').value = '1';
        document.getElementById('kpModal').style.display = 'flex';
    }

    async function saveKp() {
        const courseId = document.getElementById('kpCourseSelect').value;
        const body = {
            name: document.getElementById('kpName').value,
            description: document.getElementById('kpDesc').value,
            difficulty: document.getElementById('kpDifficulty').value,
            orderIndex: parseInt(document.getElementById('kpOrder').value)||1
        };
        await fetch('/api/knowledge-points/course/' + courseId, {
            method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
        });
        closeModal('kpModal');
        loadKnowledgePoints();
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    async function sendChat() {
        const inp = document.getElementById('chatInput');
        const text = inp.value.trim();
        if (!text) return;
        appendChatMsg('user', text);
        inp.value = '';
        try {
            const res = await fetch('/api/chat/send', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({message:text})
            });
            const data = await res.json();
            appendChatMsg('assistant', data.reply);
        } catch(e) { appendChatMsg('assistant', '错误: '+e.message); }
    }

    function appendChatMsg(role, content) {
        const div = document.getElementById('chatMessages');
        div.innerHTML += `<div style="margin-bottom:10px"><strong>${role==='user'?'你':'CogniFlow'}:</strong><br>${escapeHtml(content).replace(/\n/g,'<br>')}</div>`;
        div.scrollTop = div.scrollHeight;
    }

    async function loadChatHistory() {
        try {
            const history = await fetch('/api/chat/history').then(r=>r.json());
            const div = document.getElementById('chatMessages');
            div.innerHTML = history.map(m => 
                `<div style="margin-bottom:10px"><strong>${m.role==='user'?'你':'CogniFlow'}:</strong><br>${escapeHtml(m.content).replace(/\n/g,'<br>')}</div>`
            ).join('');
        } catch(e) {}
    }

    function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

    loadDashboardPlans();
</script>
</body>
</html>
