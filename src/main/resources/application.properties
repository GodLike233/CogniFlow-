spring.application.name=CogniFlow
server.port=8080

# ====== MySQL 数据库配置 ======
spring.datasource.url=jdbc:mysql://localhost:3306/cogniflow?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update

# ====== 火山引擎豆包大模型 ======
ark.api.key=${ARK_API_KEY}
ark.model.id=${VOLCENGINE_SESSION_TOKEN}
