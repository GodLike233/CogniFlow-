<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能规划 - CogniFlow</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0f0c29;--bg2:#1a1742;--bg3:#24243e;--card-bg:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.08);--text:#e8e8e8;--text-dim:rgba(255,255,255,0.5);--accent:#a78bfa;--topbar-bg:rgba(0,0,0,0.2);--topbar-text:rgba(255,255,255,0.8);--btn-text:#e0e0e0;--dropdown-bg:#1a1a2e;--input-bg:rgba(255,255,255,0.06);--footer-color:rgba(255,255,255,0.3)}
        .light{--bg:#f0f4ff;--bg2:#e8eeff;--bg3:#f5f3ff;--card-bg:rgba(255,255,255,0.85);--card-border:rgba(124,58,237,0.15);--text:#0a0a14;--text-dim:rgba(0,0,0,0.6);--accent:#6d28d9;--topbar-bg:rgba(255,255,255,0.85);--topbar-text:rgba(0,0,0,0.75);--btn-text:#1a1a2e;--dropdown-bg:#f0f0f0;--input-bg:rgba(0,0,0,0.04);--footer-color:rgba(0,0,0,0.3)}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(160deg,var(--bg) 0%,var(--bg2) 30%,var(--bg3) 60%,var(--bg) 100%);min-height:100vh;color:var(--text);transition:background .6s,color .3s;animation:pageIn .5s ease}
        @keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
        @keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
        .topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 28px;background:var(--topbar-bg);border-bottom:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
        .topbar .brand{font-size:20px;font-weight:700;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .topbar .right{display:flex;align-items:center;gap:12px}
        .user-menu{position:relative;display:flex;align-items:center}
        .user-menu .uname{font-size:13px;color:var(--topbar-text);cursor:pointer;padding:4px 10px;border-radius:8px}
        .user-menu:hover .uname{background:rgba(255,255,255,0.1)}
        .user-menu .dropdown{display:none;position:absolute;top:100%;right:0;background:var(--dropdown-bg);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:4px;min-width:100px;z-index:10}
        .user-menu:hover .dropdown{display:block;animation:fadeDown .2s ease}
        .user-menu .dropdown button{display:block;width:100%;text-align:left;padding:8px 14px;background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;border-radius:6px}
        .user-menu .dropdown button:hover{background:rgba(255,255,255,0.08)}
        .theme-btn{border-radius:50%;width:34px;height:34px;padding:0;font-size:16px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);cursor:pointer;color:var(--btn-text)}
        .nav-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:var(--btn-text);padding:7px 16px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .3s}
        .nav-btn:hover{background:rgba(255,255,255,0.15);color:var(--text);transform:translateY(-1px)}
        .nav-btn.accent{background:rgba(167,139,250,0.2);border-color:rgba(167,139,250,0.4);color:#c4b5fd}

        .hero{text-align:center;padding:44px 20px 28px;animation:fadeUp .6s ease}
        .hero h1{font-size:34px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800;margin-bottom:8px}
        .hero p{font-size:14px;color:var(--text-dim)}

        .main{max-width:900px;margin:0 auto;padding:0 24px 60px}
        .plan-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
        .plan-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:18px;padding:26px 24px;text-align:center;transition:all .4s cubic-bezier(.4,0,.2,1);animation:fadeUp .5s both}
        .plan-card:nth-child(1){animation-delay:0s}
        .plan-card:nth-child(2){animation-delay:.1s}
        .plan-card:nth-child(3){animation-delay:.2s}
        .plan-card:nth-child(4){animation-delay:.3s}
        .plan-card:hover{border-color:rgba(167,139,250,0.4);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,0.2)}
        .plan-card .icon{font-size:36px;margin-bottom:12px;transition:transform .3s}
        .plan-card:hover .icon{transform:scale(1.08)}
        .plan-card h3{font-size:17px;margin-bottom:6px;color:var(--text)}
        .plan-card .desc{font-size:12px;color:var(--text-dim);margin-bottom:16px;line-height:1.5}
        .plan-card .input-row{display:flex;gap:8px}
        .plan-card input{flex:1;padding:10px 14px;background:var(--input-bg);border:1px solid var(--card-border);border-radius:10px;color:var(--text);font-size:13px;outline:none;font-family:inherit;transition:.3s}
        .plan-card input:focus{border-color:var(--accent)}
        .plan-card input::placeholder{color:var(--text-dim)}
        .plan-card button{padding:10px 18px;background:linear-gradient(135deg,#a78bfa,#6366f1);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:.3s;white-space:nowrap}
        .plan-card button:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(99,102,241,0.3)}

        .footer{text-align:center;padding:40px;font-size:12px;color:var(--footer-color)}
        @media(max-width:700px){.plan-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="topbar">
    <div class="brand" style="cursor:pointer" onclick="location.href='/welcome'">✦ CogniFlow</div>
    <div class="right">
        <button class="theme-btn" onclick="toggleTheme()">🌙</button>
        <button class="nav-btn" onclick="location.href='/'">🏠 主页</button>
        <button class="nav-btn" onclick="location.href='/courses'">📚 课程</button>
        <button class="nav-btn" onclick="location.href='/exam'">📝 考试</button>
        <button class="nav-btn" onclick="location.href='/plans'">📋 我的计划</button>
        <div class="user-menu">
            <span class="uname" id="userName">未登录</span>
            <div class="dropdown"><button onclick="location.href='/profile'">👤 个人信息</button><button onclick="logout()">退出登录</button></div>
        </div>
    </div>
</div>

<div class="hero">
    <h1>🗺️ 智能规划</h1>
    <p>选择一个学习模式，输入你想学习的内容，AI 将为你定制个性化学习计划</p>
</div>

<div class="main">
    <div class="plan-grid">
        <div class="plan-card" id="card-challenge21">
            <div class="icon">🗓️</div>
            <h3>21天兴趣挑战</h3>
            <p class="desc">从零开始培养一门兴趣或技能，AI 按21天习惯养成周期分解每日任务，循序渐进打好基础</p>
            <div class="input-row">
                <input type="text" placeholder="输入你想挑战的内容，如：学弹吉他" id="inp-challenge21">
                <button onclick="startPlan('challenge21')">开始</button>
            </div>
        </div>
        <div class="plan-card" id="card-speedrun">
            <div class="icon">⚡</div>
            <h3>极速冲刺</h3>
            <p class="desc">时间紧迫？AI 提炼课程核心考点，压缩学习路径，用最高效的方式帮你快速通关</p>
            <div class="input-row">
                <input type="text" placeholder="输入要速通的课程名，如：计算机组成原理" id="inp-speedrun">
                <button onclick="startPlan('speedrun')">开始</button>
            </div>
        </div>
        <div class="plan-card" id="card-exam">
            <div class="icon">🎯</div>
            <h3>考级冲刺</h3>
            <p class="desc">针对考试/认证定制刷题+复习计划，覆盖高频考点，模拟实战节奏，考前冲刺拿分</p>
            <div class="input-row">
                <input type="text" placeholder="输入考试名称，如：CET-6 / 考研数学" id="inp-exam">
                <button onclick="startPlan('exam')">开始</button>
            </div>
        </div>
        <div class="plan-card" id="card-checkin">
            <div class="icon">✅</div>
            <h3>每日打卡</h3>
            <p class="desc">养成良好的每日学习习惯，AI 生成轻量日课，每天完成任务打卡记录成长轨迹</p>
            <div class="input-row">
                <input type="text" placeholder="输入打卡目标，如：每天背50个单词" id="inp-checkin">
                <button onclick="startPlan('checkin')">开始</button>
            </div>
        </div>
    </div>
</div>

<div class="footer">基于火山引擎豆包大模型 · CogniFlow 教学管理系统</div>

<script>
const user = JSON.parse(localStorage.getItem('cf_user')||'{}');
if(!user.userId) window.location.replace('/login');
document.getElementById('userName').textContent = user.username;

let isDark = localStorage.getItem('cf_theme') !== 'light';
function applyTheme(){document.body.classList.toggle('light',!isDark);document.querySelector('.theme-btn').textContent=isDark?'🌙':'☀️'}
function toggleTheme(){isDark=!isDark;localStorage.setItem('cf_theme',isDark?'dark':'light');applyTheme()}
applyTheme();

const planPrompts = {
    challenge21: '我想在21天内从零开始学习「{topic}」，请帮我制定一个详细的21天学习计划。每天包含具体的任务和目标，按阶段拆分。格式要求：每个阶段用 ## 标题，每天的任务用 Day N: 开头。',
    speedrun: '我需要快速掌握「{topic}」，时间非常紧迫。请帮我制定一个最高效的速通学习计划，只抓核心重点和高频考点。格式要求：每个阶段用 ## 标题，每天的任务用 Day N: 开头。',
    exam: '我正在备考「{topic}」，请帮我制定一个考前冲刺学习计划。重点覆盖高频考点、常见题型和易错点，包含刷题安排。格式要求：每个阶段用 ## 标题，每天的任务用 Day N: 开头。',
    checkin: '我想养成每天「{topic}」的习惯，请帮我设计一个每日打卡计划。任务量适中容易坚持，关注习惯养成而非速成。格式要求：每个阶段用 ## 标题，每天的任务用 Day N: 开头。'
};

function startPlan(type){
    const inp = document.getElementById('inp-'+type);
    const topic = inp.value.trim();
    if(!topic){inp.focus();inp.style.borderColor='#ef4444';setTimeout(()=>inp.style.borderColor='',1500);return}
    const prompt = planPrompts[type].replace('{topic}', topic);
    localStorage.setItem('cf_plan', JSON.stringify({planType:type, topic:topic, fullMsg:prompt}));
    window.location.href = '/index';
}

['challenge21','speedrun','exam','checkin'].forEach(type=>{
    document.getElementById('inp-'+type).addEventListener('keydown',function(e){
        if(e.key==='Enter') startPlan(type);
    });
});

function logout(){localStorage.removeItem('cf_user');window.location.href='/login'}
</script>
</body>
</html>
