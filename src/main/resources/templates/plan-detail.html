<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计划详情 - CogniFlow</title>
    <script>
function renderMarkdown(text){
    if(!text) return '';
    var html = text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/### (.+)/g,'<h3>$1</h3>')
        .replace(/## (.+)/g,'<h2>$1</h2>')
        .replace(/# (.+)/g,'<h1>$1</h1>')
        .replace(/- (.+)/g,'<li>$1</li>')
        .replace(/\n\n/g,'</p><p>')
        .replace(/\n/g,'<br>');
    html = '<p>'+html+'</p>';
    html = html.replace(/<li>[\s\S]*?<\/li>/g,function(m){return '<ul style="padding-left:20px;margin:6px 0">'+m+'</ul>';});
    return html;
}
</script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0f0c29;--text:#e8e8e8;--text-dim:rgba(255,255,255,0.5);--card-bg:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.08);--accent:#a78bfa;--accent2:#7c3aed;--topbar-bg:rgba(0,0,0,0.3);--tooltip-bg:#1a1a2e;--btn-text:#e0e0e0;--topbar-text:rgba(255,255,255,0.8)}
        .light{--bg:#f0f4ff;--text:#0a0a14;--text-dim:rgba(0,0,0,0.6);--card-bg:rgba(255,255,255,0.8);--card-border:rgba(124,58,237,0.15);--accent:#6d28d9;--accent2:#5b21b6;--topbar-bg:rgba(255,255,255,0.85);--tooltip-bg:#f0f0f0;--btn-text:#1a1a2e;--topbar-text:rgba(0,0,0,0.75)}
        body{
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
            background:linear-gradient(160deg,var(--bg) 0%,var(--bg) 30%,var(--bg) 60%,var(--bg) 100%);
            min-height:100vh;color:var(--text);transition:background .6s,color .3s;
            animation:pageIn .5s ease;
        }
        @keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
        @keyframes gradientFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 28px;background:var(--topbar-bg);border-bottom:1px solid var(--card-border);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
        .topbar .brand{font-size:20px;font-weight:700;background:linear-gradient(135deg,#a78bfa,#60a5fa,#8b5cf6,#a78bfa);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradientFlow 4s ease infinite}
        .topbar .right{display:flex;align-items:center;gap:12px}
        .user-menu{position:relative;display:flex;align-items:center}
        .user-menu .uname{font-size:13px;color:var(--topbar-text);cursor:pointer;padding:4px 10px;border-radius:8px;transition:.3s}
        .user-menu .uname:hover{background:rgba(255,255,255,0.1);color:var(--text)}
        .user-menu .dropdown{display:none;position:absolute;top:100%;right:0;background:var(--tooltip-bg);border:1px solid var(--card-border);border-radius:10px;padding:4px;min-width:100px;z-index:10}
        .user-menu:hover .dropdown{display:block;animation:fadeDown .2s ease}
        .user-menu .dropdown button{display:block;width:100%;text-align:left;padding:8px 14px;background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;border-radius:6px}
        .user-menu .dropdown button:hover{background:rgba(255,255,255,0.08);color:var(--text)}
        .theme-btn{border-radius:50%;width:34px;height:34px;padding:0;font-size:16px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);cursor:pointer;color:var(--btn-text)}
        .nav-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:var(--btn-text);padding:7px 16px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .3s}
        .nav-btn:hover{background:rgba(255,255,255,0.15);color:var(--text);transform:translateY(-1px)}

        .main{max-width:860px;margin:0 auto;padding:24px 20px 60px;animation:fadeUp .5s .1s both}
        .header-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:28px 30px;margin-bottom:20px;animation:fadeUp .5s both;transition:opacity .3s}
        .header-card.updating{opacity:.4;pointer-events:none}
        .header-card h1{font-size:22px;color:var(--text);margin-bottom:8px}
        .header-card .sub{font-size:13px;color:var(--text-dim);margin-bottom:16px}
        .header-card .progress-info{display:flex;align-items:center;gap:20px}
        .header-card .big-pct{font-size:42px;font-weight:700;color:var(--accent);animation:fadeUp .6s .1s both}
        .header-card .p-bar{flex:1;height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
        .header-card .p-bar div{height:100%;border-radius:4px;background:linear-gradient(90deg,#a78bfa,#6366f1);transition:width 1s cubic-bezier(.4,0,.2,1);animation:barSlide 1s .3s both}
        @keyframes barSlide{from{width:0!important}}
        .header-card .day-info{font-size:13px;color:var(--text-dim);margin-top:8px}
        .header-card .btn-row{display:flex;gap:10px;margin-top:16px}
        .btn-primary{padding:8px 20px;background:rgba(167,139,250,0.2);border:1px solid rgba(167,139,250,0.4);color:var(--btn-text);border-radius:20px;font-size:13px;cursor:pointer}
        .btn-primary:hover{background:rgba(167,139,250,0.35);color:var(--text);transform:translateY(-1px)}

        .roadmap-section{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:24px;margin-bottom:20px;animation:fadeUp .5s .2s both}
        .roadmap-section h3{font-size:16px;color:var(--accent);margin-bottom:16px}
        .roadmap-days{display:flex;gap:7px;overflow-x:auto;padding:6px 0;scroll-behavior:smooth;flex-wrap:wrap}
        .roadmap-days::-webkit-scrollbar{height:4px}
        .roadmap-days::-webkit-scrollbar-thumb{background:rgba(167,139,250,0.3);border-radius:2px}
        .day-node{min-width:100px;max-width:140px;padding:10px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;text-align:center;transition:.3s;flex-shrink:0;position:relative;animation:fadeUp .5s both}
        .day-node.done{border:2px solid rgba(34,197,94,0.7)!important;background:rgba(34,197,94,0.08)!important;box-shadow:0 0 16px rgba(34,197,94,0.2)!important}
        .day-node.done::after{content:'✓';position:absolute;top:-6px;right:-6px;background:#22c55e;color:#000;width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
        .day-node.active{border-color:rgba(167,139,250,0.65)!important;box-shadow:0 0 20px rgba(167,139,250,0.2)!important;background:rgba(167,139,250,0.15)!important}
        .day-node .day-num{font-size:17px;font-weight:700;color:var(--accent)}
        .day-node .day-label{font-size:10px;color:var(--text-dim);margin-top:3px;max-height:26px;overflow:hidden;line-height:1.3}
        .day-node .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);margin:5px auto 0;opacity:.4}
        .day-node.done .dot{background:#22c55e;opacity:1;box-shadow:0 0 8px rgba(34,197,94,0.6)}
        .day-node .tooltip{display:none;position:absolute;bottom:calc(100%+8px);left:50%;transform:translateX(-50%);background:var(--tooltip-bg);border:1px solid rgba(167,139,250,0.3);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--text-dim);white-space:nowrap;z-index:10;pointer-events:none}
        .day-node:hover .tooltip{display:block}

        .content-section{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:24px;animation:fadeUp .5s .3s both}
        .content-section h3{font-size:16px;color:var(--accent);margin-bottom:16px}
        .md-content{font-size:14px;line-height:1.7}
        .md-content p{margin:8px 0}
        .md-content h1,.md-content h2,.md-content h3,.md-content h4{color:var(--accent);margin:12px 0 8px;font-weight:600;border-bottom:1px solid rgba(167,139,250,0.2);padding-bottom:4px}
        .md-content ul,.md-content ol{padding-left:20px;margin:8px 0}
        .md-content li{margin:5px 0}
        .md-content strong{color:var(--text);font-weight:600}
        .md-content pre{background:rgba(0,0,0,0.2);border:1px solid var(--card-border);border-radius:8px;padding:14px;overflow-x:auto;margin:10px 0}

        .not-found{text-align:center;padding:80px 20px;color:var(--text-dim)}
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:200;justify-content:center;align-items:center}
        .modal-overlay.show{display:flex}
        .modal{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:28px;width:90%;max-width:700px;max-height:85vh;display:flex;flex-direction:column;animation:scaleIn .3s ease}
        @keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
        .modal h3{font-size:17px;color:var(--accent);margin-bottom:12px}
        .modal .warn{font-size:12px;color:#eab308;background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.25);border-radius:8px;padding:10px 14px;margin-bottom:14px;line-height:1.5}
        .modal textarea{flex:1;min-height:260px;padding:14px;background:var(--input-bg);border:1px solid var(--card-border);border-radius:12px;color:var(--text);font-size:13px;font-family:monospace;resize:vertical;outline:none;line-height:1.6}
        .modal textarea:focus{border-color:var(--accent)}
        .modal .btn-row{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
        .modal .btn-row button{padding:10px 22px;border-radius:10px;font-size:13px;cursor:pointer;border:none;transition:.3s}
        .modal .btn-save{background:linear-gradient(135deg,#a78bfa,#6366f1);color:#fff;font-weight:600}
        .modal .btn-save:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(99,102,241,0.3)}
        .modal .btn-cancel{background:rgba(255,255,255,0.08);border:1px solid var(--card-border);color:var(--text-dim)}
        .modal .btn-cancel:hover{background:rgba(255,255,255,0.12);color:var(--text)}
    </style>
</head>
<body>
<div class="topbar">
    <div class="brand" style="cursor:pointer" onclick="location.href='/welcome'">✦ CogniFlow</div>
    <div class="right">
        <button class="theme-btn" onclick="toggleTheme()">🌙</button>
        <button class="nav-btn" onclick="location.href='/welcome'">🏠 主页</button>
        <button class="nav-btn" onclick="location.href='/plans'">📋 我的计划</button>
        <button class="nav-btn" onclick="location.href='/index'">💬 AI对话</button>
        <div class="user-menu">
            <span class="uname" id="userName">未登录</span>
            <div class="dropdown"><button onclick="location.href='/profile'">👤 个人信息</button><button onclick="logout()">退出登录</button></div>
        </div>
    </div>
</div>

<div class="main" id="mainContent">
    <div class="not-found">加载中...</div>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h3>📝 编辑计划内容（Markdown）</h3>
        <div class="warn">⚠️ 注意：请保持 <code>Day N: 任务描述</code> 的格式不变，每个 Day 独占一行，否则路线图将无法正确解析。修改后点击保存即可。</div>
        <textarea id="editContent"></textarea>
        <div class="btn-row">
            <button class="btn-cancel" onclick="closeEdit()">取消</button>
            <button class="btn-save" onclick="saveEdit()">保存</button>
        </div>
    </div>
</div>

<script>
const user = JSON.parse(localStorage.getItem('cf_user')||'{}');
if(!user.userId) window.location.replace('/login');
document.getElementById('userName').textContent = user.username;

let isDark = localStorage.getItem('cf_theme') !== 'light';
function applyTheme(){document.body.classList.toggle('light',!isDark);document.querySelector('.theme-btn').textContent=isDark?'🌙':'☀️'}
function toggleTheme(){isDark=!isDark;localStorage.setItem('cf_theme',isDark?'dark':'light');applyTheme()}
applyTheme();

const planId = window.location.pathname.split('/').pop();
let currentPlan = null;
let planDays = [];

function parsePlanDays(content){
    const days=[];const lines=content.split('\n');
    for(let l of lines){
        let clean=l.replace(/^\*\*|\*\*$/g,'').replace(/^[\s\-•*]+/,'').trim();
        let m=clean.match(/^Day\s*(\d+)[：:]\s*(.+)/);
        if(m){
            let label=m[2].trim().replace(/\*+$/g,'').trim();
            if(label) days.push({day:parseInt(m[1]),label:label.substring(0,60)});
        }
    }
    return days;
}

function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

async function loadPlan(){
    try{
        const plans=await fetch('/api/plans/user/'+user.userId).then(r=>r.json());
        const plan=plans.find(p=>p.id==planId);
        if(!plan){document.getElementById('mainContent').innerHTML='<div class="not-found">计划不存在</div>';return}
        currentPlan=plan;
        planDays=parsePlanDays(plan.content);
        const progress=plan.progressDays||0;
        const total=planDays.length||0;
        const pct=total>0?Math.round(progress/total*100):0;
        const typeLabels={challenge21:'21天兴趣挑战',speedrun:'速通课程挑战',exam:'考级冲刺计划',checkin:'习惯打卡养成'};

        document.getElementById('mainContent').innerHTML=`
            <div class="header-card">
                <h1>${escapeHtml(plan.title)}</h1>
                <div class="sub">${typeLabels[plan.planType]||plan.planType||''} · 创建于 ${(plan.createdAt||'').substring(0,10)}</div>
                <div class="progress-info">
                    <div class="big-pct">${pct}%</div>
                    <div style="flex:1">
                        <div class="p-bar"><div style="width:${pct}%"></div></div>
                        <div class="day-info">已完成 ${progress}/${total} 天</div>
                    </div>
                </div>
                <div class="btn-row">
                    <button class="btn-primary" onclick="adjustProgress(-1)">📉 退一天</button>
                    <button class="btn-primary" onclick="adjustProgress(1)">📈 进一天</button>
                </div>
            </div>
            <div class="roadmap-section">
                <h3>📋 学习路线图</h3>
                <div class="roadmap-days" id="detailRoadmap">${planDays.map((d,i)=>{
                    let cls='';
                    if(i<progress)cls='done';
                    else if(i===progress)cls='active';
                    const tip=d.label.length>15?`<div class="tooltip">${d.label}</div>`:'';
                    return `<div class="day-node ${cls}">
                        <div class="day-num">Day ${d.day}</div>
                        <div class="day-label">${d.label}</div>
                        <div class="dot"></div>
                        ${tip}
                    </div>`;
                }).join('')}</div>
            </div>
            <div class="content-section">
                <h3>📄 AI 完整回复内容 <button class="btn-primary" onclick="openEdit()" style="margin-left:12px;font-size:12px;padding:4px 14px">✏️ 编辑</button></h3>
                <div class="md-content">${renderMarkdown(plan.content)}</div>
            </div>`;
    }catch(e){document.getElementById('mainContent').innerHTML='<div class="not-found">加载失败</div>';}
}

async function adjustProgress(delta){
    if(!currentPlan) return;
    const hdr=document.querySelector('.header-card');
    hdr.classList.add('updating');
    const progress=currentPlan.progressDays||0;
    const total=planDays.length||0;
    const next=Math.max(0,Math.min(total,progress+delta));
    if(next===progress){setTimeout(()=>hdr.classList.remove('updating'),200);return}
    try{
        const res=await fetch('/api/plans/'+currentPlan.id+'/progress',{
            method:'PUT',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({progressDays:next})
        });
        currentPlan=await res.json();
        const pct=total>0?Math.round(next/total*100):0;
        document.querySelector('.big-pct').textContent=pct+'%';
        document.querySelector('.p-bar div').style.width=pct+'%';
        document.querySelector('.day-info').textContent='已完成 '+next+'/'+total+' 天';
        const nodes=document.querySelectorAll('.day-node');
        nodes.forEach((n,i)=>{
            n.classList.remove('done','active');
            if(i<next)n.classList.add('done');
            else if(i===next)n.classList.add('active');
        });
        setTimeout(()=>hdr.classList.remove('updating'),150);
    }catch(e){hdr.classList.remove('updating');alert('更新失败')}
}

function logout(){localStorage.removeItem('cf_user');localStorage.removeItem('cf_theme');window.location.href='/login'}

function openEdit(){
    document.getElementById('editContent').value = currentPlan.content||'';
    document.getElementById('editModal').classList.add('show');
}
function closeEdit(){
    document.getElementById('editModal').classList.remove('show');
}
async function saveEdit(){
    const content = document.getElementById('editContent').value;
    if(!content.trim()){alert('内容不能为空');return}
    try{
        const newDays = parsePlanDays(content);
        const res = await fetch('/api/plans/'+currentPlan.id+'/content',{
            method:'PUT',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({content:content, totalDays:newDays.length||0})
        });
        if(res.ok){
            currentPlan.content = content;
            planDays = parsePlanDays(content);
            closeEdit();
            await loadPlan();
        }else{
            const d = await res.json();
            alert(d.message||'保存失败');
        }
    }catch(e){alert('保存失败: '+e.message)}
}

document.getElementById('editModal').addEventListener('click', function(e){
    if(e.target===this) closeEdit();
});

loadPlan();
</script>
</body>
</html>
