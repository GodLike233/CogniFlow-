<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CogniFlow 教学管理系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0f0c29;--bg2:#1a1742;--bg3:#24243e;--card-bg:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.08);--text:#e8e8e8;--text-dim:rgba(255,255,255,0.5);--accent:#a78bfa;--topbar-bg:rgba(0,0,0,0.2);--topbar-text:rgba(255,255,255,0.8);--btn-text:#e0e0e0;--footer-color:rgba(255,255,255,0.3);--dropdown-bg:#1a1a2e}
        .light{--bg:#f0f4ff;--bg2:#e8eeff;--bg3:#f5f3ff;--card-bg:rgba(255,255,255,0.85);--card-border:rgba(124,58,237,0.15);--text:#0a0a14;--text-dim:rgba(0,0,0,0.6);--accent:#6d28d9;--topbar-bg:rgba(255,255,255,0.85);--topbar-text:rgba(0,0,0,0.75);--btn-text:#1a1a2e;--footer-color:rgba(0,0,0,0.3);--dropdown-bg:#f0f0f0}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(160deg,var(--bg) 0%,var(--bg2) 30%,var(--bg3) 60%,var(--bg) 100%);min-height:100vh;color:var(--text);transition:background .6s,color .3s;animation:pageIn .5s ease}
        @keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
        @keyframes gradientFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 28px;background:var(--topbar-bg);border-bottom:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
        .topbar .brand{font-size:20px;font-weight:700;background:linear-gradient(135deg,#a78bfa,#60a5fa,#8b5cf6,#a78bfa);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradientFlow 4s ease infinite}
        .topbar .right{display:flex;align-items:center;gap:12px}
        .user-menu{position:relative;display:flex;align-items:center}
        .user-menu .uname{font-size:13px;color:var(--topbar-text);cursor:pointer;padding:4px 10px;border-radius:8px}
        .user-menu .uname:hover{background:rgba(255,255,255,0.1);color:var(--text)}
        .user-menu .dropdown{display:none;position:absolute;top:100%;right:0;background:var(--dropdown-bg);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:4px;min-width:100px;z-index:10}
        .user-menu:hover .dropdown{display:block;animation:fadeDown .2s ease}
        .user-menu .dropdown button{display:block;width:100%;text-align:left;padding:8px 14px;background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;border-radius:6px}
        .user-menu .dropdown button:hover{background:rgba(255,255,255,0.08);color:var(--text)}
        .nav-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:var(--btn-text);padding:7px 16px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .3s}
        .nav-btn:hover{background:rgba(255,255,255,0.15);color:var(--text);transform:translateY(-1px)}
        .nav-btn.admin{background:rgba(234,179,8,0.15);border-color:rgba(234,179,8,0.3);color:#eab308}
        .theme-btn{border-radius:50%;width:34px;height:34px;padding:0;font-size:16px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);cursor:pointer}

        .hero{text-align:center;padding:50px 20px 36px;animation:fadeUp .6s ease}
        .hero h1{font-size:38px;background:linear-gradient(135deg,#a78bfa,#60a5fa,#8b5cf6,#a78bfa);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradientFlow 4s ease infinite;font-weight:800;margin-bottom:8px}
        .hero p{font-size:15px;color:var(--text-dim)}

        .main{max-width:960px;margin:0 auto;padding:0 24px 60px}
        .three-cards{display:flex;gap:20px;justify-content:center}
        .entry-card{flex:1;min-width:0;max-width:300px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:32px 26px;cursor:pointer;text-align:center;transition:all .4s cubic-bezier(.4,0,.2,1);animation:fadeUp .5s both}
        .entry-card:nth-child(1){animation-delay:.1s}
        .entry-card:nth-child(2){animation-delay:.2s}
        .entry-card:nth-child(3){animation-delay:.3s}
        .entry-card:hover{transform:translateY(-8px);box-shadow:0 24px 60px rgba(0,0,0,0.3);border-color:rgba(167,139,250,0.4)}
        .entry-card .icon{font-size:48px;margin-bottom:18px;transition:transform .4s}
        .entry-card:hover .icon{transform:scale(1.06)}
        .entry-card h3{font-size:19px;margin-bottom:10px}
        .entry-card p{font-size:13px;color:var(--text-dim);line-height:1.6}
        .entry-card .arrow{display:inline-block;margin-top:16px;font-size:20px;color:rgba(167,139,250,0.5);transition:all .3s}
        .entry-card:hover .arrow{color:var(--accent);transform:translateX(4px)}

        .footer{text-align:center;padding:40px;font-size:12px;color:var(--footer-color)}
        .ann-carousel{max-width:700px;margin:0 auto 20px;background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.15);border-radius:12px;padding:10px 18px;display:flex;align-items:center;gap:8px}
        .ann-carousel .ann-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
        .ann-carousel .ann-text{font-size:13px;color:var(--text-dim);line-height:1.5;min-height:20px}
        .ann-carousel .ann-text .ann-title{color:var(--accent);font-weight:500;margin-right:6px;white-space:nowrap}
        @media(max-width:760px){.three-cards{flex-direction:column;align-items:center}.entry-card{max-width:100%}}
    </style>
</head>
<body>
<div class="topbar">
    <div class="brand" style="cursor:pointer" onclick="location.href='/welcome'">✦ CogniFlow</div>
    <div class="right">
        <button class="theme-btn" onclick="toggleTheme()">🌙</button>
        <button class="nav-btn" onclick="location.href='/courses'">📚 课程</button>
        <button class="nav-btn" onclick="location.href='/exam'">📝 考试</button>
        <button class="nav-btn" onclick="location.href='/plans'">📋 我的计划</button>
        <button class="nav-btn admin" id="adminBtn" onclick="location.href='/admin'" style="display:none">⚙️ 管理</button>
        <div class="user-menu">
            <span class="uname" id="userName">未登录</span>
            <div class="dropdown"><button onclick="location.href='/profile'">👤 个人信息</button><button onclick="logout()">退出登录</button></div>
        </div>
    </div>
</div>

<div class="hero">
    <h1>CogniFlow 教学管理平台</h1>
    <p>课程学习 · 学业考试 · 智能规划 — 三合一教学管理系统</p>
</div>

<div class="main">
    <div class="ann-carousel" id="annCarousel" style="display:none">
        <div class="ann-dot"></div>
        <div class="ann-text" id="annText"></div>
    </div>
    <div class="three-cards">
        <div class="entry-card" onclick="location.href='/courses'">
            <div class="icon">📚</div>
            <h3>课程学习</h3>
            <p>浏览全部课程，查看知识点树形结构，标记学习进度，系统自动记录学习轨迹</p>
            <span class="arrow">→</span>
        </div>
        <div class="entry-card" onclick="location.href='/exam'">
            <div class="icon">📝</div>
            <h3>学业考试</h3>
            <p>选择课程进行知识点自评测试，系统自动计算得分与掌握率，定位薄弱环节</p>
            <span class="arrow">→</span>
        </div>
        <div class="entry-card" onclick="location.href='/planning'">
            <div class="icon">🗺️</div>
            <h3>智能规划</h3>
            <p>选择学习模式，输入目标内容，AI为你定制个性化学习计划并生成每日任务路线图</p>
            <span class="arrow">→</span>
        </div>
    </div>
</div>

<div class="footer">基于火山引擎豆包大模型 · CogniFlow 教学管理系统</div>

<script>
const user = JSON.parse(localStorage.getItem('cf_user')||'{}');
if(!user.userId) window.location.replace('/login');
document.getElementById('userName').textContent = user.username;
if(user.role==='ADMIN') document.getElementById('adminBtn').style.display='';

let isDark = localStorage.getItem('cf_theme') !== 'light';
function applyTheme(){document.body.classList.toggle('light',!isDark);document.querySelector('.theme-btn').textContent=isDark?'🌙':'☀️'}
function toggleTheme(){isDark=!isDark;localStorage.setItem('cf_theme',isDark?'dark':'light');applyTheme()}
applyTheme();
function logout(){localStorage.removeItem('cf_user');window.location.href='/login'}

let annList=[];let annIdx=0;let annTimer=null;
async function loadAnnouncements(){
    try{
        const anns=await fetch('/api/admin/announcements').then(r=>r.json());
        annList=anns.filter(a=>a.pinned);
        if(annList.length===0) return;
        document.getElementById('annCarousel').style.display='flex';
        if(annTimer) clearInterval(annTimer);
        annIdx=0;
        document.getElementById('annText').innerHTML=`<span class="ann-title">📢 ${annList[0].title}</span>${annList[0].content||''}`;
        if(annList.length>1) annTimer=setInterval(()=>{annIdx=(annIdx+1)%annList.length;
            document.getElementById('annText').innerHTML=`<span class="ann-title">📢 ${annList[annIdx].title}</span>${annList[annIdx].content||''}`;
        },4000);
    }catch(e){}
}
loadAnnouncements();
</script>
</body>
</html>
