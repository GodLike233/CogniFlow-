<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程学习 - CogniFlow</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0f0c29;--text:#e8e8e8;--text-dim:rgba(255,255,255,0.5);--card-bg:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.08);--accent:#a78bfa;--topbar-bg:rgba(0,0,0,0.2);--topbar-text:rgba(255,255,255,0.8);--btn-text:#e0e0e0;--dropdown-bg:#1a1a2e;--input-bg:rgba(255,255,255,0.06);--success:#22c55e;--gold:#f59e0b}
        .light{--bg:#f0f4ff;--text:#0a0a14;--text-dim:rgba(0,0,0,0.6);--card-bg:rgba(255,255,255,0.8);--card-border:rgba(124,58,237,0.15);--accent:#6d28d9;--topbar-bg:rgba(255,255,255,0.85);--topbar-text:rgba(0,0,0,0.75);--btn-text:#1a1a2e;--dropdown-bg:#f0f0f0;--input-bg:rgba(0,0,0,0.04);--success:#16a34a;--gold:#d97706}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(160deg,var(--bg) 0%,var(--bg) 30%,var(--bg) 60%,var(--bg) 100%);min-height:100vh;color:var(--text);transition:background .6s,color .3s;animation:pageIn .5s ease}
        @keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
        @keyframes gradientFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        @keyframes marquee{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
        .topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 28px;background:var(--topbar-bg);border-bottom:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
        .topbar .brand{font-size:20px;font-weight:700;background:linear-gradient(135deg,#a78bfa,#60a5fa,#8b5cf6,#a78bfa);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradientFlow 4s ease infinite}
        .topbar .right{display:flex;align-items:center;gap:12px}
        .user-menu{position:relative;display:flex;align-items:center}
        .user-menu .uname{font-size:13px;color:var(--topbar-text);cursor:pointer;padding:4px 10px;border-radius:8px}
        .user-menu:hover .uname{background:rgba(255,255,255,0.1)}
        .user-menu .dropdown{display:none;position:absolute;top:100%;right:0;background:var(--dropdown-bg);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:4px;min-width:100px;z-index:10}
        .user-menu:hover .dropdown{display:block;animation:fadeDown .2s ease}
        .user-menu .dropdown button{display:block;width:100%;text-align:left;padding:8px 14px;background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;border-radius:6px}
        .user-menu .dropdown button:hover{background:rgba(255,255,255,0.08)}
        .theme-btn{border-radius:50%;width:34px;height:34px;padding:0;font-size:16px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);cursor:pointer;color:var(--btn-text)}
        .nav-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:var(--btn-text);padding:7px 16px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .3s}
        .nav-btn:hover{background:rgba(255,255,255,0.15);color:var(--text);transform:translateY(-1px)}
        .nav-btn.active{background:rgba(167,139,250,0.2);border-color:rgba(167,139,250,0.4);color:#c4b5fd}

        .main{max-width:860px;margin:0 auto;padding:24px 20px 60px;animation:fadeUp .5s .1s both}
        .main h2{font-size:20px;color:var(--accent);margin-bottom:16px}

        .ann-carousel{background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.15);border-radius:12px;padding:10px 18px;margin-bottom:18px;position:relative;display:flex;align-items:center;gap:8px}
        .ann-carousel .ann-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
        .ann-carousel .ann-text{font-size:13px;color:var(--text-dim);line-height:1.5;min-height:20px}
        .ann-carousel .ann-text .ann-title{color:var(--accent);font-weight:500;margin-right:6px;white-space:nowrap}

        .course-list{display:flex;flex-direction:column;gap:1px;margin-bottom:14px}
        .course-row{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:0;cursor:pointer;transition:all .3s}
        .course-row:first-child{border-radius:14px 14px 0 0}
        .course-row:last-child{border-radius:0 0 14px 14px}
        .course-row:only-child{border-radius:14px}
        .course-row:hover{background:rgba(167,139,250,0.06);border-color:rgba(167,139,250,0.2)}
        .course-row.selected{background:rgba(167,139,250,0.1);border-color:var(--accent)}
        .course-row.all-done{border-color:rgba(245,158,11,0.3)}
        .course-row.all-done h4{color:var(--gold)}
        .course-row .c-left{display:flex;align-items:center;gap:14px;flex:1}
        .course-row .c-icon{font-size:22px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(167,139,250,0.12);border-radius:10px}
        .course-row .c-info{flex:1;min-width:0}
        .course-row .c-info h4{font-size:15px;font-weight:600;margin-bottom:3px}
        .course-row .c-info .c-meta{font-size:11px;color:var(--text-dim)}
        .course-row .c-right{font-size:14px;color:var(--text-dim);transition:.3s;margin-left:12px;display:flex;align-items:center;gap:6px}
        .course-row.selected .c-right{color:var(--accent)}
        .course-row .c-status{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(234,179,8,0.12);color:#eab308;flex-shrink:0}
        .course-row .c-status.done{background:rgba(34,197,94,0.12);color:#4ade80}
        .course-row.all-done .c-status{background:rgba(245,158,11,0.15);color:var(--gold)}

        .kp-section{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:24px;overflow:hidden;animation:fadeUp .3s ease}
        .kp-section h3{font-size:16px;color:var(--accent);margin-bottom:16px}
        .kp-tree{list-style:none}
        .kp-item{padding:12px 16px;margin-bottom:6px;background:rgba(255,255,255,0.025);border:1px solid var(--card-border);border-radius:10px;display:flex;justify-content:space-between;align-items:center;transition:.3s}
        .kp-item:hover{background:rgba(167,139,250,0.06)}
        .kp-item .left-side{display:flex;align-items:center}
        .kp-item .name{font-size:14px;font-weight:500}
        .kp-item .diff{font-size:11px;padding:2px 8px;border-radius:20px;margin-left:8px;background:rgba(234,179,8,0.12);color:rgba(234,179,8,0.9)}
        .kp-item .diff.med{background:rgba(168,85,247,0.12);color:rgba(168,85,247,0.9)}
        .kp-item .diff.hard{background:rgba(239,68,68,0.12);color:rgba(239,68,68,0.9)}
        .kp-item .actions{display:flex;gap:6px}
        .kp-item .actions button{padding:5px 12px;border-radius:8px;font-size:12px;cursor:pointer;transition:.3s;background:rgba(255,255,255,0.06);border:1px solid var(--card-border);color:var(--text-dim);white-space:nowrap}
        .kp-item .actions button:hover{background:rgba(167,139,250,0.2);border-color:rgba(167,139,250,0.4);color:var(--accent)}
        .kp-item .actions button.studying{background:rgba(234,179,8,0.15);border-color:rgba(234,179,8,0.3);color:#eab308}
        .kp-item .actions button.done{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.3);color:#4ade80}
        .kp-item .actions button.done:hover{background:rgba(34,197,94,0.25)}
        .kp-item .actions button.ai-btn{background:rgba(59,130,246,0.08);border-color:rgba(59,130,246,0.2);color:#60a5fa}
        .kp-item .actions button.ai-btn:hover{background:rgba(59,130,246,0.2);border-color:rgba(59,130,246,0.4)}
        .kp-children{margin-left:20px;border-left:2px solid rgba(167,139,250,0.2);padding-left:12px}

        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:200;justify-content:center;align-items:center}
        .modal-overlay.show{display:flex}
        .modal{background:var(--dropdown-bg);border:1px solid rgba(167,139,250,0.3);border-radius:20px;padding:28px 30px;max-width:440px;width:92%;animation:fadeUp .25s ease}
        .modal h4{font-size:17px;color:var(--accent);margin-bottom:18px}
        .modal input,.modal textarea{width:100%;padding:10px 14px;background:var(--input-bg);border:1px solid var(--card-border);border-radius:10px;color:var(--text);font-size:14px;outline:none;font-family:inherit;resize:vertical}
        .modal input:focus,.modal textarea:focus{border-color:var(--accent)}
        .modal .btn-row{display:flex;gap:10px;margin-top:18px}
        .modal .btn-row button{flex:1;padding:10px;border-radius:10px;font-size:14px;cursor:pointer;transition:.3s}
        .modal .btn-cancel{background:rgba(255,255,255,0.06);border:1px solid var(--card-border);color:var(--text-dim)}
        .modal .btn-ok{background:linear-gradient(135deg,#a78bfa,#6366f1);border:none;color:#fff;font-weight:600}
        .modal label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:4px}

        .empty{text-align:center;padding:60px 20px;color:var(--text-dim)}
        .empty .big{font-size:36px;margin-bottom:10px}
        .empty2{text-align:center;padding:30px;color:var(--text-dim);font-size:13px}
    </style>
</head>
<body>
<div class="topbar">
    <div class="brand" style="cursor:pointer" onclick="location.href='/welcome'">✦ CogniFlow</div>
    <div class="right">
        <button class="theme-btn" onclick="toggleTheme()">🌙</button>
        <button class="nav-btn" onclick="location.href='/'">🏠 主页</button>
        <button class="nav-btn active">📚 课程</button>
        <button class="nav-btn" onclick="location.href='/exam'">📝 考试</button>
        <button class="nav-btn" onclick="location.href='/plans'">📋 我的计划</button>
        <div class="user-menu">
            <span class="uname" id="userName">未登录</span>
            <div class="dropdown"><button onclick="location.href='/profile'">👤 个人信息</button><button onclick="logout()">退出登录</button></div>
        </div>
    </div>
</div>

<div class="main">
    <h2 style="display:flex;align-items:center;gap:12px">📚 课程学习 <button class="nav-btn" onclick="openRequestModal()" style="font-size:12px;padding:5px 14px">📝 申请新课程</button></h2>
    <div class="ann-carousel" id="annCarousel" style="display:none">
        <div class="ann-dot"></div>
        <div class="ann-text" id="annText"></div>
    </div>
    <div class="course-list" id="courseList"></div>
    <div id="kpArea"></div>
    <div class="empty" id="emptyHint"><div class="big">👆</div><p>点击上方课程查看知识点树</p></div>
</div>

<div class="modal-overlay" id="reqModal">
    <div class="modal">
        <h4>📝 申请新课程</h4>
        <label>课程主题</label><input type="text" id="reqTopic" placeholder="如：C语言程序设计">
        <label>补充说明(可选)</label><textarea id="reqDesc" rows="3" placeholder="希望包含哪些内容，面向什么目标..."></textarea>
        <div class="btn-row">
            <button class="btn-cancel" onclick="document.getElementById('reqModal').classList.remove('show')">取消</button>
            <button class="btn-ok" onclick="submitRequest()">提交申请</button>
        </div>
    </div>
</div>

<script>
const user = JSON.parse(localStorage.getItem('cf_user')||'{}');
if(!user.userId) window.location.replace('/login');
document.getElementById('userName').textContent = user.username;

let isDark = localStorage.getItem('cf_theme') !== 'light';
function applyTheme(){document.body.classList.toggle('light',!isDark);document.querySelector('.theme-btn').textContent=isDark?'🌙':'☀️'}
function toggleTheme(){isDark=!isDark;localStorage.setItem('cf_theme',isDark?'dark':'light');applyTheme()}
applyTheme();

let selectedCourseId = null;
let allCourses = [];
let studyRecords = [];
const courseIcons = ['☕','🐍','🌐','📊','🤖','🔒','📱','🗄️'];

async function init(){
    try{
        [allCourses, studyRecords] = await Promise.all([
            fetch('/api/courses').then(r=>r.json()),
            fetch('/api/study-records/user/'+user.userId).then(r=>r.json())
        ]);
    }catch(e){}
    await renderCourseList();
    loadAnnouncements();
}
init();

function getKpStatus(kpId){
    const recs = studyRecords.filter(r=>r.kpId===kpId);
    if(recs.length===0) return 'none';
    recs.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
    const latest = recs[0].status;
    if(latest==='NONE') return 'none';
    return latest==='COMPLETED'?'completed':latest==='STUDYING'?'studying':'none';
}

function getCourseProgress(courseId){
    const course = allCourses.find(c=>c.id===courseId);
    if(!course||!course._kps||course._kps.length===0) return {completed:0,total:0,allDone:false};
    const completed = course._kps.filter(k=>getKpStatus(k.id)==='completed').length;
    const total = course._kps.length;
    return {completed,total,allDone:completed>=total};
}

async function renderCourseList(){
    for(let c of allCourses){
        try{c._kps=await fetch('/api/knowledge-points/course/'+c.id).then(r=>r.json())}catch(e){c._kps=[]}
    }
    document.getElementById('courseList').innerHTML = allCourses.map((c,i)=>{
        const prog = getCourseProgress(c.id);
        let statusHtml='';
        if(prog.total>0){
            if(prog.allDone) statusHtml=`<span class="c-status done">${prog.completed}/${prog.total}</span>`;
            else if(prog.completed>0) statusHtml=`<span class="c-status">${prog.completed}/${prog.total}</span>`;
        }
        return `<div class="course-row ${prog.allDone?'all-done':''}" onclick="selectCourse(${c.id})" id="cr-${c.id}">
            <div class="c-left">
                <div class="c-icon">${courseIcons[i%courseIcons.length]}</div>
                <div class="c-info">
                    <h4>${c.name}</h4>
                    <div class="c-meta">${c.category||''} · ${c.description||''}</div>
                </div>
            </div>
            <div class="c-right">${statusHtml}▶</div>
        </div>`;
    }).join('');
}

let annTimer = null;
let annIdx = 0;
let annList = [];
async function loadAnnouncements(){
    try{
        const anns=await fetch('/api/admin/announcements').then(r=>r.json());
        annList=anns.filter(a=>a.pinned);
        if(annList.length===0) return;
        document.getElementById('annCarousel').style.display='flex';
        if(annTimer) clearInterval(annTimer);
        annIdx=0;
        showAnn(0);
        if(annList.length>1) annTimer=setInterval(()=>{annIdx=(annIdx+1)%annList.length;showAnn(annIdx)},4000);
    }catch(e){}
}
function showAnn(i){
    const a=annList[i];
    document.getElementById('annText').innerHTML=`<span class="ann-title">📢 ${a.title}</span>${a.content||''}`;
}

async function selectCourse(id){
    selectedCourseId = id;
    document.querySelectorAll('.course-row').forEach(el=>el.classList.remove('selected'));
    document.getElementById('cr-'+id).classList.add('selected');
    document.getElementById('emptyHint').style.display='none';
    try{
        const kps = await fetch('/api/knowledge-points/course/'+id).then(r=>r.json());
        if(!kps||!kps.length){
            document.getElementById('kpArea').innerHTML = `<div class="kp-section" style="margin-top:14px"><h3>🌲 知识点树</h3><div class="empty2">该课程暂无知识点</div></div>`;
            return;
        }
        const course=allCourses.find(c=>c.id==id);
        document.getElementById('kpArea').innerHTML = `<div class="kp-section" style="margin-top:14px">
            <h3>🌲 ${course?.name||''} 知识点树 (${kps.length}个)</h3>
            <div>${buildTreeHtml(kps)}</div>
        </div>`;
    }catch(e){
        document.getElementById('kpArea').innerHTML = '<div class="kp-section"><div class="empty2">加载知识点失败</div></div>';
    }
}

function buildTreeHtml(list){
    const roots=list.filter(k=>!k.parentId);
    if(!roots.length) return list.map(k=>renderKpNode(k,list)).join('');
    return '<ul class="kp-tree">'+roots.map(k=>renderKpNode(k,list)).join('')+'</ul>';
}
function renderKpNode(kp,list){
    const children=list.filter(k=>k.parentId===kp.id);
    const diffCls=kp.difficulty==='BEGINNER'?'':kp.difficulty==='MEDIUM'?'med':'hard';
    const diffLabel=kp.difficulty==='BEGINNER'?'入门':kp.difficulty==='MEDIUM'?'中等':kp.difficulty==='ADVANCED'?'困难':'';
    const status = getKpStatus(kp.id);
    return `<li class="kp-item">
        <div class="left-side"><span class="name">${kp.name}</span><span class="diff ${diffCls}">${diffLabel}</span></div>
        <div class="actions">
            <button class="ai-btn" onclick="event.stopPropagation();askAI('${kp.name.replace(/'/g,"\\'")}')">💬 问AI</button>
            <button class="${status==='studying'?'studying':''}" onclick="toggleStatus(${kp.id},'STUDYING','${status}')">${status==='studying'?'★ 学习中':'学习中'}</button>
            <button class="${status==='completed'?'done':''}" onclick="toggleStatus(${kp.id},'COMPLETED','${status}')">${status==='completed'?'✓ 已完成':'✓ 完成'}</button>
        </div>
    </li>${children.length?'<ul class="kp-children">'+children.map(c=>renderKpNode(c,list)).join('')+'</ul>':''}`;
}

async function toggleStatus(kpId,targetStatus,currentStatus){
    let newStatus;
    if(targetStatus==='COMPLETED'&&currentStatus==='completed') newStatus='NONE';
    else if(targetStatus==='STUDYING'&&currentStatus==='studying') newStatus='NONE';
    else newStatus=targetStatus;
    try{
        await fetch('/api/study-records',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({userId:user.userId,kpId:kpId,status:newStatus,score:newStatus==='COMPLETED'?100:newStatus==='STUDYING'?50:0,timeSpent:30})});
        studyRecords = await fetch('/api/study-records/user/'+user.userId).then(r=>r.json());
        for(let c of allCourses){
            try{c._kps=await fetch('/api/knowledge-points/course/'+c.id).then(r=>r.json())}catch(e){c._kps=[]}
        }
        renderCourseList();
        selectCourse(selectedCourseId);
    }catch(e){alert('操作失败')}
}

function askAI(kpName){
    localStorage.setItem('cf_plan', JSON.stringify({planType:'speedrun', topic:kpName,
        fullMsg:'请详细讲解「'+kpName+'」这个知识点，包括核心概念、关键要点、常见误区，并给出一个练习题。'}));
    window.location.href='/index';
}

function openRequestModal(){
    document.getElementById('reqTopic').value='';
    document.getElementById('reqDesc').value='';
    document.getElementById('reqModal').classList.add('show');
}
async function submitRequest(){
    const topic=document.getElementById('reqTopic').value.trim();
    if(!topic){alert('请输入课程主题');return}
    const desc=document.getElementById('reqDesc').value.trim();
    try{
        await fetch('/api/course-request/submit',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({userId:user.userId,topic:topic,description:desc})});
        document.getElementById('reqModal').classList.remove('show');
        alert('申请已提交，管理员审核通过后将自动生成课程！');
    }catch(e){alert('提交失败')}
}

function logout(){localStorage.removeItem('cf_user');window.location.href='/login'}
</script>
</body>
</html>
