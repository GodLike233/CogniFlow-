<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CogniFlow 登录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
            background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
            min-height:100vh;display:flex;justify-content:center;align-items:center;
            overflow:hidden;position:relative;
        }
        .bg{position:absolute;width:100%;height:100%;
            background:radial-gradient(circle at 30% 50%,rgba(120,119,241,0.15),transparent 50%),
                       radial-gradient(circle at 70% 20%,rgba(100,180,255,0.1),transparent 40%);}
        .wrapper{
            display:flex;flex-direction:column;align-items:center;z-index:1;gap:30px;
        }
        .card{
            background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.1);border-radius:24px;
            padding:48px 40px;width:420px;
            box-shadow:0 30px 80px rgba(0,0,0,0.4);
        }
        .logo{text-align:center;margin-bottom:36px}
        @keyframes gradientFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .logo h1{font-size:32px;background:linear-gradient(135deg,#a78bfa,#60a5fa,#8b5cf6,#a78bfa);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradientFlow 4s ease infinite;font-weight:700}
        .logo p{color:rgba(255,255,255,0.5);font-size:13px;margin-top:6px}
        .tabs{display:flex;gap:0;margin-bottom:28px;border-radius:12px;background:rgba(255,255,255,0.05);padding:4px}
        .tabs button{flex:1;padding:10px;border:none;background:transparent;color:rgba(255,255,255,0.5);font-size:14px;cursor:pointer;border-radius:10px;transition:.3s}
        .tabs button.active{background:rgba(120,119,241,0.3);color:#fff;font-weight:600}
        .fg{margin-bottom:20px}
        .fg label{display:block;font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
        .fg input,.fg select{width:100%;padding:14px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-size:14px;outline:none;transition:.3s}
        .fg input:focus,.fg select:focus{border-color:#a78bfa;background:rgba(255,255,255,0.1)}
        .fg select{appearance:none;cursor:pointer}
        .fg select option{background:#1a1a2e;color:#fff}
        .btn{width:100%;padding:14px;background:linear-gradient(135deg,#a78bfa,#6366f1);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:.3s}
        .btn:hover{transform:translateY(-1px);box-shadow:0 10px 30px rgba(99,102,241,0.4)}
        .btn:active{transform:scale(0.98)}
        .err{color:#f87171;font-size:13px;text-align:center;margin-top:14px;display:none}
        .footer{text-align:center;font-size:11px;color:rgba(255,255,255,0.3)}
    </style>
</head>
<body>
<div class="bg"></div>
<div class="wrapper">
    <div class="card">
        <div class="logo">
            <h1>CogniFlow</h1>
            <p>AI驱动的个性化学习导航</p>
        </div>
        <div class="tabs">
            <button class="active" id="lt" onclick="switchTab('login')">登录</button>
            <button id="rt" onclick="switchTab('register')">注册</button>
        </div>
        <div id="lform">
            <div class="fg"><label>用户名</label><input type="text" id="luser" placeholder="输入用户名"></div>
            <div class="fg"><label>密码</label><input type="password" id="lpass" placeholder="输入密码"></div>
            <button class="btn" onclick="login()">登录</button>
        </div>
        <div id="rform" style="display:none">
            <div class="fg"><label>用户名</label><input type="text" id="ruser" placeholder="输入用户名"></div>
            <div class="fg"><label>密码</label><input type="password" id="rpass" placeholder="输入密码"></div>
            <div class="fg"><label>身份</label><select id="rrole"><option value="STUDENT">学习者</option><option value="ADMIN">管理员</option></select></div>
            <button class="btn" onclick="register()">注册</button>
        </div>
        <p class="err" id="err"></p>
    </div>
    <div class="footer">基于火山引擎豆包大模型 · 课设作品</div>
</div>
<script>
let mode='login';
function switchTab(t){ mode=t;document.getElementById('lt').classList.toggle('active',t==='login');document.getElementById('rt').classList.toggle('active',t==='register');document.getElementById('lform').style.display=t==='login'?'block':'none';document.getElementById('rform').style.display=t==='register'?'block':'none';hideErr() }
function hideErr(){document.getElementById('err').style.display='none'}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.style.display='block'}
async function login(){
    const u=document.getElementById('luser').value.trim(),p=document.getElementById('lpass').value.trim();
    if(!u||!p){showErr('请输入用户名和密码');return}
    try{
        const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
        const d=await r.json();
        if(d.code===200){localStorage.setItem('cf_user',JSON.stringify(d));window.location.href='/welcome'}
        else showErr(d.message)
    }catch(e){showErr('网络错误')}
}
async function register(){
    const u=document.getElementById('ruser').value.trim(),p=document.getElementById('rpass').value.trim(),role=document.getElementById('rrole').value;
    if(!u||!p){showErr('请输入用户名和密码');return}
    try{
        const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p,role:role})});
        const d=await r.json();
        if(d.code===200){switchTab('login');document.getElementById('luser').value=u}
        else showErr(d.message)
    }catch(e){showErr('网络错误')}
}
document.getElementById('lpass').addEventListener('keydown',e=>{if(e.key==='Enter')login()})
</script>
</body>
</html>
