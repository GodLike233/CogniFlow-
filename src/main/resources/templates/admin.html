<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - CogniFlow</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0f0c29;--text:#e8e8e8;--text-dim:rgba(255,255,255,0.5);--card-bg:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.08);--accent:#a78bfa;--topbar-bg:rgba(0,0,0,0.3);--topbar-text:rgba(255,255,255,0.8);--btn-text:#e0e0e0;--dropdown-bg:#1a1a2e;--input-bg:rgba(255,255,255,0.06);--overlay-bg:rgba(0,0,0,0.6);--modal-bg:#1a1a2e;--danger:#ef4444;--success:#22c55e;--warning:#f59e0b;--sidebar-w:220px}
        .light{--bg:#f0f4ff;--text:#0a0a14;--text-dim:rgba(0,0,0,0.6);--card-bg:rgba(255,255,255,0.8);--card-border:rgba(124,58,237,0.15);--accent:#6d28d9;--topbar-bg:rgba(255,255,255,0.92);--topbar-text:rgba(0,0,0,0.75);--btn-text:#1a1a2e;--dropdown-bg:#f0f0f0;--input-bg:rgba(0,0,0,0.04);--overlay-bg:rgba(0,0,0,0.3);--modal-bg:#f5f3ff;--danger:#dc2626;--success:#16a34a;--warning:#d97706}
        .light .sidebar{background:rgba(255,255,255,0.55);border-right-color:rgba(124,58,237,0.12)}
        .light .sidebar .s-nav button:hover{background:rgba(109,40,217,0.06)}
        .light .sidebar .s-nav button.active{background:rgba(109,40,217,0.08)}
        .light .sidebar .s-bottom button:hover,.light .sidebar .s-bottom .s-user:hover{background:rgba(0,0,0,0.04)}
        .light .sidebar .theme-btn:hover{background:rgba(0,0,0,0.04)}

        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);min-height:100vh;color:var(--text);transition:background .6s,color .3s;display:flex}
        @keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        @keyframes gradientFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        @keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
        @keyframes chartGrow{from{stroke-dashoffset:var(--end)}}

        /* ===== SIDEBAR ===== */
        .sidebar{width:var(--sidebar-w);background:rgba(0,0,0,0.25);border-right:1px solid var(--card-border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:110;backdrop-filter:blur(8px);overflow-y:auto;overflow-x:hidden;transition:width .25s ease}
        .sidebar .s-brand{font-size:17px;font-weight:700;padding:22px 18px 18px;border-bottom:1px solid var(--card-border);background:linear-gradient(135deg,#a78bfa,#60a5fa,#8b5cf6,#a78bfa);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradientFlow 4s ease infinite;cursor:pointer}
        .sidebar .s-nav{flex:1;padding:8px 0}
        .sidebar .s-nav button{display:flex;align-items:center;gap:10px;width:100%;padding:12px 18px;background:transparent;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;transition:.2s;text-align:left;border-left:3px solid transparent;white-space:nowrap;overflow:hidden}
        .sidebar .s-nav button:hover{background:rgba(167,139,250,0.08);color:var(--text)}
        .sidebar .s-nav button.active{color:var(--accent);background:rgba(167,139,250,0.1);border-left-color:var(--accent);font-weight:600}
        .sidebar .s-nav button .badge-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);margin-left:auto;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        .sidebar .s-bottom{padding:12px;border-top:1px solid var(--card-border);display:flex;flex-direction:column;gap:6px}
        .sidebar .s-bottom button,.sidebar .s-bottom .s-user{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;font-size:13px;cursor:pointer;transition:.2s;background:transparent;border:none;color:var(--text-dim);text-align:left}
        .sidebar .s-bottom button:hover,.sidebar .s-bottom .s-user:hover{background:rgba(255,255,255,0.06);color:var(--text)}
        .sidebar .s-bottom .s-user{background:rgba(234,179,8,0.1);color:#eab308;font-weight:600;justify-content:space-between}
        .sidebar .s-bottom .s-user .drop{font-size:10px;color:rgba(234,179,8,0.5)}
        .sidebar .s-user-wrap{position:relative}
        .sidebar .s-user-wrap::after{content:'';position:absolute;top:calc(100% - 4px);left:0;right:0;height:8px;z-index:9}
        .sidebar .s-user-wrap .s-dropdown{display:none;position:absolute;bottom:100%;left:0;right:0;background:var(--dropdown-bg);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:4px;z-index:10;margin-bottom:4px}
        .sidebar .s-user-wrap:hover .s-dropdown{display:block;animation:fadeDown .2s ease}
        .sidebar .s-user-wrap .s-dropdown button{display:block;width:100%;padding:8px 14px}
        .sidebar .theme-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;font-size:13px;cursor:pointer;transition:.2s;background:transparent;border:none;color:var(--text-dim);text-align:left}
        .sidebar .theme-btn:hover{background:rgba(255,255,255,0.06);color:var(--text)}

        .sidebar.collapsed{width:60px}
        .sidebar.collapsed .s-brand{font-size:0;padding:16px 0;text-align:center}
        .sidebar.collapsed .s-brand::before{content:'✦';font-size:20px;display:block}
        .sidebar.collapsed .s-nav button{font-size:0;justify-content:center;padding:12px 0}
        .sidebar.collapsed .s-nav button::before{content:attr(data-icon);font-size:18px}
        .sidebar.collapsed .s-bottom{padding:8px}
        .sidebar.collapsed .s-bottom .collapse-btn{font-size:0;justify-content:center;padding:8px 0}
        .sidebar.collapsed .s-bottom .collapse-btn::before{content:'▶';font-size:14px}
        .sidebar.collapsed .s-bottom .theme-btn{font-size:14px;justify-content:center;padding:8px 0}
        .sidebar.collapsed + .main-area{margin-left:60px}
        .collapse-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;font-size:13px;cursor:pointer;transition:.2s;background:transparent;border:none;color:var(--text-dim);text-align:left;width:100%}
        .collapse-btn:hover{background:rgba(255,255,255,0.06);color:var(--text)}

        /* ===== MAIN CONTENT ===== */
        .main-area{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column;transition:margin-left .25s ease}
        .main-topbar{display:flex;justify-content:flex-end;align-items:center;padding:12px 28px;background:var(--topbar-bg);border-bottom:1px solid var(--card-border);gap:10px;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
        .export-wrap{position:relative}
        .export-wrap::after{content:'';position:absolute;top:100%;left:0;right:0;height:8px;z-index:9}
        .export-wrap .dropdown{display:none;position:absolute;top:calc(100% + 4px);right:0;background:var(--dropdown-bg);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:4px;min-width:130px;z-index:10}
        .export-wrap:hover .dropdown{display:block;animation:fadeDown .2s ease}
        .export-wrap .dropdown button{display:block;width:100%;text-align:left;padding:8px 14px;background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;border-radius:6px}
        .export-wrap .dropdown button:hover{background:rgba(255,255,255,0.08)}

        .main{flex:1;padding:24px 28px 60px;animation:fadeUp .5s .1s both}
        .panel{display:none}
        .panel.active{display:block;animation:slideIn .4s ease}
        .panel h3{font-size:18px;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}

        /* ===== CHARTS & STATS ===== */
        .stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;margin-bottom:20px}
        .stat-card{padding:18px 12px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;text-align:center;transition:.3s;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:85px}
        .stat-card:hover{transform:translateY(-2px);border-color:rgba(167,139,250,0.25);box-shadow:0 8px 24px rgba(0,0,0,0.15)}
        .stat-card .num{font-size:28px;font-weight:700;color:var(--accent)}
        .stat-card .lbl{font-size:12px;color:var(--text-dim);margin-top:4px}
        .stat-card .sub{font-size:11px;color:var(--text-dim);margin-top:2px}

        .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px}
        @media(max-width:860px){.charts-row{grid-template-columns:1fr}}
        .chart-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;padding:20px;transition:.3s}
        .chart-card:hover{border-color:rgba(167,139,250,0.25)}
        .chart-card .c-title{font-size:14px;color:var(--text-dim);margin-bottom:14px;font-weight:500}
        .chart-card .donut-wrap{display:flex;align-items:center;justify-content:center;gap:30px}
        .donut-svg{transform:rotate(-90deg);width:120px;height:120px}
        .donut-svg circle{fill:none;stroke-width:12}
        .donut-svg .bg{stroke:rgba(255,255,255,0.06)}
        .donut-svg .val{transition:stroke-dashoffset 1s ease}
        .donut-legend{display:flex;flex-direction:column;gap:10px;font-size:12px}
        .donut-legend .item{display:flex;align-items:center;gap:8px}
        .donut-legend .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
        .bar-chart{display:flex;align-items:flex-end;gap:12px;height:160px;padding:0 4px}
        .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
        .bar-col .bar-val{font-size:12px;font-weight:600;color:var(--accent)}
        .bar-col .bar-fill{width:100%;border-radius:6px 6px 0 0;transition:height 1s ease;min-height:4px}
        .bar-col .bar-label{font-size:11px;color:var(--text-dim);text-align:center}

        .filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
        .filter-bar select,.filter-bar input{padding:8px 14px;background:var(--input-bg);border:1px solid var(--card-border);border-radius:10px;color:var(--text);font-size:13px;outline:none;font-family:inherit}
        .filter-bar select:focus,.filter-bar input:focus{border-color:var(--accent)}

        .table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--card-border)}
        table{width:100%;border-collapse:collapse}
        table th,table td{padding:12px 16px;text-align:left;font-size:13px;border-bottom:1px solid var(--card-border)}
        table th{color:var(--text-dim);font-weight:500;background:var(--card-bg);white-space:nowrap}
        table td{color:var(--text)}
        table tbody tr{transition:background .2s}
        table tbody tr:hover{background:rgba(167,139,250,0.04)}

        .btn-sm{padding:5px 14px;border-radius:8px;font-size:12px;cursor:pointer;transition:.3s;border:1px solid var(--card-border);background:rgba(255,255,255,0.06);color:var(--text-dim)}
        .btn-sm:hover{background:rgba(167,139,250,0.2);border-color:rgba(167,139,250,0.4);color:var(--text)}
        .btn-sm.danger:hover{background:rgba(248,113,113,0.2);border-color:rgba(248,113,113,0.4);color:#f87171}
        .btn-sm.accent{background:rgba(167,139,250,0.2);border-color:rgba(167,139,250,0.4);color:var(--accent)}
        .btn-sm.accent:hover{background:rgba(167,139,250,0.35)}

        .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
        .badge-s{background:rgba(59,130,246,0.15);color:#3b82f6}
        .badge-m{background:rgba(168,85,247,0.15);color:#a855f7}
        .badge-t{background:rgba(34,197,94,0.15);color:#22c55e}
        .badge-h{background:rgba(249,115,22,0.15);color:#f97316}
        .badge-easy{background:rgba(34,197,94,0.15);color:#22c55e}
        .badge-medium{background:rgba(234,179,8,0.15);color:#ca8a04}
        .badge-hard{background:rgba(239,68,68,0.15);color:#ef4444}
        .badge-done{background:rgba(34,197,94,0.15);color:#22c55e}
        .badge-pending{background:rgba(234,179,8,0.15);color:#ca8a04}
        .badge-pinned{background:rgba(168,85,247,0.15);color:#a855f7;margin-left:6px}

        .truncate{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block}

        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--overlay-bg);z-index:200;justify-content:center;align-items:center}
        .modal-overlay.show{display:flex}
        .modal{background:var(--modal-bg);border:1px solid rgba(167,139,250,0.3);border-radius:20px;padding:28px 30px;max-width:480px;width:92%;max-height:85vh;overflow-y:auto;animation:scaleIn .25s ease}
        .modal.wide{max-width:600px}
        .modal h4{font-size:17px;color:var(--accent);margin-bottom:18px}
        .modal label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:4px;margin-top:12px}
        .modal input,.modal textarea,.modal select{width:100%;padding:10px 14px;background:var(--input-bg);border:1px solid var(--card-border);border-radius:10px;color:var(--text);font-size:14px;outline:none;font-family:inherit;resize:vertical}
        .modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--accent)}
        .modal .inline-row{display:flex;gap:10px}
        .modal .inline-row>*{flex:1}
        .modal .btn-row{display:flex;gap:10px;margin-top:18px}
        .modal .btn-row button{flex:1;padding:10px;border-radius:10px;font-size:14px;cursor:pointer;transition:.3s}
        .modal .btn-cancel{background:rgba(255,255,255,0.06);border:1px solid var(--card-border);color:var(--text-dim)}
        .modal .btn-cancel:hover{background:rgba(255,255,255,0.1)}
        .modal .btn-ok{background:linear-gradient(135deg,#a78bfa,#6366f1);border:none;color:#fff;font-weight:600}
        .modal .btn-ok:hover{box-shadow:0 8px 20px rgba(99,102,241,0.3)}
        .modal .toggle-row{display:flex;align-items:center;gap:10px;margin-top:14px}
        .modal .toggle-row label.toggle-lbl{font-size:14px;color:var(--text);margin:0}
        .modal input[type="checkbox"]{width:auto;accent-color:var(--accent)}

        .student-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px}
        .student-detail-grid .item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--card-border)}
        .student-detail-grid .item .key{color:var(--text-dim);font-size:13px}
        .student-detail-grid .item .val{color:var(--text);font-size:13px;font-weight:500}

        .empty-state{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:14px}

        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
        .toast.show{opacity:1}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="s-brand" onclick="location.href='/welcome'">✦ CogniFlow</div>
    <div class="s-nav">
        <button class="active" onclick="switchTab('overview',this)" data-icon="📊">📊 数据总览</button>
        <button onclick="switchTab('courses',this)" data-icon="📚">📚 课程管理</button>
        <button onclick="switchTab('creqs',this)" data-icon="📩" id="creqTab">📩 课程申请 <span class="badge-dot" id="creqDot" style="display:none"></span></button>
        <button onclick="switchTab('kp',this)" data-icon="🌲">🌲 知识点</button>
        <button onclick="switchTab('questions',this)" data-icon="📝">📝 题库管理</button>
        <button onclick="switchTab('exams',this)" data-icon="📋">📋 考试记录</button>
        <button onclick="switchTab('students',this)" data-icon="👥">👥 学生管理</button>
        <button onclick="switchTab('plans',this)" data-icon="📋">📋 计划监控</button>
        <button onclick="switchTab('announcements',this)" data-icon="📢">📢 公告管理</button>
        <button onclick="switchTab('logs',this)" data-icon="📜">📜 系统日志</button>
    </div>
    <div class="s-bottom">
        <button class="theme-btn" onclick="toggleTheme()">🌙 主题切换</button>
        <button class="collapse-btn" onclick="toggleSidebar()">◀ 收起菜单</button>
    </div>
</div>

<div class="main-area">
    <div class="main-topbar">
        <button class="btn-sm" onclick="location.href='/'">🏠 返回前台</button>
        <div style="flex:1"></div>
        <div class="export-wrap">
            <button class="btn-sm">📥 导出数据 ▾</button>
            <div class="dropdown">
                <button onclick="exportData('courses')">📚 导出课程</button>
                <button onclick="exportData('students')">👥 导出学生</button>
                <button onclick="exportData('exams')">📝 导出考试</button>
                <button onclick="exportData('plans')">📋 导出计划</button>
            </div>
        </div>
        <span style="font-size:13px;color:var(--text-dim);font-weight:600;padding:4px 10px;background:rgba(234,179,8,0.12);border-radius:8px;cursor:pointer" onclick="location.href='/profile'" id="sUserName">管理员</span>
    </div>
    <div class="main">

    <div class="panel active" id="panel-overview">
        <h3>📊 平台数据总览</h3>
        <div class="stats-row" id="overviewStats"></div>
        <div class="charts-row">
            <div class="chart-card">
                <div class="c-title">📈 课程与知识点分布</div>
                <div class="donut-wrap" id="courseDonut"></div>
            </div>
            <div class="chart-card">
                <div class="c-title">📊 考试分数段分布</div>
                <div class="bar-chart" id="examBarChart"></div>
            </div>
        </div>
    </div>

    <div class="panel" id="panel-courses">
        <h3>📚 课程管理 <button class="btn-sm accent" onclick="openCourseModal()">＋ 新增课程</button> <button class="btn-sm accent" style="background:rgba(245,158,11,0.2);border-color:rgba(245,158,11,0.5);color:#f59e0b" onclick="openAiCourseModal()">🤖 AI生成课程</button></h3>
        <div class="filter-bar"><input type="text" placeholder="🔍 搜索课程名称或分类..." oninput="renderCourses()" id="courseSearch" style="padding:8px 14px;background:var(--input-bg);border:1px solid var(--card-border);border-radius:10px;color:var(--text);font-size:13px;outline:none;width:260px"></div>
        <div class="table-wrap"><table id="courseTable"><thead><tr><th>ID</th><th>名称</th><th>分类</th><th>描述</th><th>操作</th></tr></thead><tbody></tbody></table></div>
    </div>

    <div class="panel" id="panel-creqs">
        <h3>📩 课程申请</h3>
        <div class="table-wrap"><table id="creqTable"><thead><tr><th>ID</th><th>申请人</th><th>主题</th><th>说明</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody></tbody></table></div>
    </div>

    <div class="panel" id="panel-kp">
        <h3>🌲 知识点管理</h3>
        <div class="filter-bar">
            <select id="kpCourseSelect" onchange="loadKp()"><option value="">-- 选择课程 --</option></select>
            <button class="btn-sm accent" onclick="openKpModal()">＋ 新增知识点</button>
        </div>
        <div id="kpList"></div>
    </div>

    <div class="panel" id="panel-questions">
        <h3>📝 题库管理</h3>
        <div class="filter-bar">
            <select id="qCourseSelect" onchange="loadQuestions()"><option value="">-- 选择课程 --</option></select>
            <button class="btn-sm accent" onclick="openQuestionModal()">＋ 新增题目</button>
            <span id="qStats" style="font-size:13px;color:var(--text-dim);margin-left:8px"></span>
        </div>
        <div id="qList"></div>
    </div>

    <div class="panel" id="panel-exams">
        <h3>📋 考试记录</h3>
        <div class="filter-bar">
            <select id="examStatusFilter" onchange="renderExams()">
                <option value="">全部状态</option>
                <option value="COMPLETED">已完成</option>
                <option value="IN_PROGRESS">进行中</option>
                <option value="ABANDONED">已放弃</option>
            </select>
        </div>
        <div class="table-wrap" id="examTableWrap"></div>
    </div>

    <div class="panel" id="panel-students">
        <h3>👥 学生列表 <button class="btn-sm accent" onclick="openStudentModal()">＋ 新增学生</button></h3>
        <div class="filter-bar"><input type="text" placeholder="🔍 搜索用户名..." oninput="renderStudents()" id="studentSearch" style="padding:8px 14px;background:var(--input-bg);border:1px solid var(--card-border);border-radius:10px;color:var(--text);font-size:13px;outline:none;width:220px"></div>
        <div class="table-wrap"><table id="studentTable"><thead><tr><th>ID</th><th>用户名</th><th>邮箱</th><th>计划数</th><th>考试数</th><th>均分</th><th>操作</th></tr></thead><tbody></tbody></table></div>
    </div>

<script>
const user = JSON.parse(localStorage.getItem('cf_user') || '{}');
if (!user.userId || user.role !== 'ADMIN') window.location.replace('/');
document.getElementById('sUserName').textContent = '👑 '+user.username;

let isDark = localStorage.getItem('cf_theme') !== 'light';
function applyTheme() { document.body.classList.toggle('light', !isDark); const tb = document.querySelector('.sidebar .theme-btn'); if(tb) tb.innerHTML = (isDark?'🌙':'☀️')+(document.querySelector('.sidebar.collapsed')?'':' 主题切换'); }
function toggleTheme() { isDark = !isDark; localStorage.setItem('cf_theme', isDark ? 'dark' : 'light'); applyTheme(); }
applyTheme();

function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function openModal(id) { document.getElementById(id).classList.add('show'); }

function switchTab(name, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    const panel = document.getElementById('panel-' + name);
    if (panel) panel.classList.add('active');
    document.querySelectorAll('.s-nav button').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    const loaders = {
        overview: loadOverview, courses: loadCourses,
        creqs: loadCourseRequests,
        kp: () => { loadKpCourses(); },
        questions: () => { loadQCourseSelect(); },
        exams: loadExams, students: loadStudents, plans: loadAllPlans,
        announcements: loadAnnouncements, logs: loadLogs
    };
    if (loaders[name]) loaders[name]();
}

async function loadOverview() {
    const stats = await fetch('/api/admin/overview').then(r => r.json());
    const items = [
        ['📚 课程总数', stats.totalCourses], ['🌲 知识点', stats.totalKp],
        ['👤 学生', stats.totalStudents], ['⚙️ 管理员', stats.totalAdmins],
        ['📝 题库数量', stats.totalQuestions], ['📋 考试总数', stats.totalExams],
        ['✅ 已完成考试', stats.completedExams||0], ['📊 全校学习均分', stats.avgScore],
        ['🎯 考试均分', stats.avgExamScore||0], ['📋 学习记录', stats.totalRecords],
        ['📅 计划总数', stats.totalPlans]
    ];
    document.getElementById('overviewStats').innerHTML = items.map(i => `<div class="stat-card"><div class="num">${i[1]??0}</div><div class="lbl">${i[0]}</div></div>`).join('');

    // Donut chart: courses vs students vs questions
    const totalC = stats.totalCourses||0, totalS = stats.totalStudents||0, totalQ = stats.totalQuestions||0;
    const donutSum = totalC+totalS+totalQ||1;
    const colors = ['#a78bfa','#60a5fa','#f59e0b'];
    const dLabels = ['课程','学生','题目'];
    const dVals = [totalC,totalS,totalQ];
    const r=45, circ=2*Math.PI*r;
    let offset=0, paths='';
    dVals.forEach((v,i)=>{
        const len = (v/donutSum)*circ||0;
        const dash = len+' '+(circ-len);
        paths += `<circle class="val" r="${r}" cx="60" cy="60" stroke="${colors[i]}" stroke-dasharray="${dash}" stroke-dashoffset="${-offset}" style="--end:${circ}"/>`;
        offset += len;
    });
    if(donutSum===0) paths='<circle class="bg" r="'+r+'" cx="60" cy="60"/>';
    document.getElementById('courseDonut').innerHTML = `
        <svg class="donut-svg" viewBox="0 0 120 120"><circle class="bg" r="${r}" cx="60" cy="60"/>${paths}</svg>
        <div class="donut-legend">${dLabels.map((l,i)=>`<div class="item"><span class="dot" style="background:${colors[i]}"></span> ${l}: ${dVals[i]}</div>`).join('')}</div>`;

    // Bar chart: avg scores
    const avgExam = stats.avgExamScore||0, avgStudy = stats.avgScore||0;
    const barMax = Math.max(avgExam,avgStudy,10);
    const examH = Math.max(avgExam/barMax*140,4), studyH = Math.max(avgStudy/barMax*140,4);
    document.getElementById('examBarChart').innerHTML = `
        <div class="bar-col"><div class="bar-val">${avgExam}%</div><div class="bar-fill" style="height:${examH}px;background:linear-gradient(180deg,#a78bfa,#7c3aed)"></div><div class="bar-label">考试均分</div></div>
        <div class="bar-col"><div class="bar-val">${avgStudy}%</div><div class="bar-fill" style="height:${studyH}px;background:linear-gradient(180deg,#60a5fa,#3b82f6)"></div><div class="bar-label">学习均分</div></div>
        <div class="bar-col"><div class="bar-val">${Math.round((stats.completedExams||0)/(stats.totalExams||1)*100)}%</div><div class="bar-fill" style="height:${Math.max((stats.completedExams||0)/(stats.totalExams||1)*140,4)}px;background:linear-gradient(180deg,#34d399,#10b981)"></div><div class="bar-label">完成率</div></div>
        <div class="bar-col"><div class="bar-val">${Math.round((stats.totalPlans>0?(stats.totalRecords||0)/stats.totalPlans:0)*10)/10}</div><div class="bar-fill" style="height:${Math.min(((stats.totalRecords||0)/(stats.totalPlans||1))*20,140)}px;background:linear-gradient(180deg,#fbbf24,#f59e0b)"></div><div class="bar-label">平均记录/计划</div></div>`;
}

let allCourses = [];
async function loadCourses() {
    allCourses = await fetch('/api/courses').then(r => r.json());
    renderCourses();
}
function renderCourses() {
    const q = (document.getElementById('courseSearch')?.value || '').toLowerCase();
    const filtered = q ? allCourses.filter(c => c.name.toLowerCase().includes(q) || (c.category||'').toLowerCase().includes(q)) : allCourses;
    document.querySelector('#courseTable tbody').innerHTML = filtered.map(c => `<tr>
        <td>${c.id}</td><td>${c.name}</td><td>${c.category||'-'}</td>
        <td><span class="truncate">${c.description||'-'}</span></td>
        <td><button class="btn-sm" onclick="editCourse(${c.id})">✏️</button>
        <button class="btn-sm danger" onclick="deleteCourse(${c.id})">🗑</button></td></tr>`).join('');
}

function openCourseModal() {
    document.getElementById('courseModalTitle').textContent = '新增课程';
    document.getElementById('courseEditId').value = '';
    document.getElementById('courseName').value = '';
    document.getElementById('courseCategory').value = '';
    document.getElementById('courseDesc').value = '';
    openModal('courseModal');
}
function editCourse(id) {
    const c = allCourses.find(x => x.id === id); if (!c) return;
    document.getElementById('courseModalTitle').textContent = '编辑课程';
    document.getElementById('courseEditId').value = id;
    document.getElementById('courseName').value = c.name || '';
    document.getElementById('courseCategory').value = c.category || '';
    document.getElementById('courseDesc').value = c.description || '';
    openModal('courseModal');
}
async function saveCourse() {
    const id = document.getElementById('courseEditId').value;
    const body = {
        name: document.getElementById('courseName').value.trim(),
        category: document.getElementById('courseCategory').value.trim(),
        description: document.getElementById('courseDesc').value.trim()
    };
    if (!body.name) return toast('请输入课程名称');
    await fetch(id ? '/api/courses/' + id : '/api/courses', {
        method: id ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    closeModal('courseModal'); loadCourses(); toast('保存成功');
}
async function deleteCourse(id) {
    if (!confirm('确定删除该课程？有关联数据可能无法删除。')) return;
    await fetch('/api/courses/' + id, { method: 'DELETE' });
    loadCourses(); toast('已删除');
}

function openAiCourseModal() {
    document.getElementById('aiTopic').value = '';
    document.getElementById('aiDesc').value = '';
    document.getElementById('aiGenStatus').textContent = '';
    document.getElementById('aiGenBtn').disabled = false;
    openModal('aiCourseModal');
}

async function generateAiCourse() {
    const topic = document.getElementById('aiTopic').value.trim();
    if (!topic) return toast('请输入课程主题');
    const btn = document.getElementById('aiGenBtn');
    const status = document.getElementById('aiGenStatus');
    btn.disabled = true; btn.textContent = '⏳ 生成中...';
    status.innerHTML = '<span style="display:inline-block;animation:spin 1s linear infinite">⏳</span> AI 正在生成课程、知识树和题库，请耐心等待约15-30秒...';
    status.style.color = 'var(--text-dim)';
    try {
        const r = await fetch('/api/admin/generate-course', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ topic, description: document.getElementById('aiDesc').value.trim() })
        });
        const d = await r.json();
        if (d.error) {
            status.innerHTML = '❌ ' + d.error;
            status.style.color = '#f87171';
            btn.disabled = false; btn.textContent = '🤖 重试';
            return;
        }
        status.innerHTML = '✅ 生成成功！<br>课程「<b>'+d.courseName+'</b>」- <b>'+d.kpCount+'</b>个知识点 + <b>'+d.questionCount+'</b>道题目';
        status.style.color = '#4ade80';
        btn.textContent = '✅ 完成';
        btn.disabled = true;
        loadCourses();
        setTimeout(() => { closeModal('aiCourseModal'); btn.disabled = false; btn.textContent = '🤖 开始生成'; }, 2500);
    } catch (e) {
        status.innerHTML = '❌ 网络错误，请检查服务器';
        status.style.color = '#f87171';
        btn.disabled = false; btn.textContent = '🤖 重试';
    }
}

async function loadKpCourses() {
    const courses = await fetch('/api/courses').then(r => r.json());
    document.getElementById('kpCourseSelect').innerHTML = '<option value="">-- 选择课程 --</option>' +
        courses.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

}
async function loadKp() {
    const cid = document.getElementById('kpCourseSelect').value;
    if (!cid) { document.getElementById('kpList').innerHTML = '<div class="empty-state">请先选择课程</div>'; return; }
    const kps = await fetch('/api/knowledge-points/course/' + cid).then(r => r.json());
    const diffMap = { BEGINNER: '入门', MEDIUM: '中等', ADVANCED: '困难' };
    document.getElementById('kpList').innerHTML = '<div class="table-wrap"><table><thead><tr><th>ID</th><th>名称</th><th>难度</th><th>排序</th><th>父节点</th><th>操作</th></tr></thead><tbody>' +
        kps.map(k => {
            const parent = kps.find(p => p.id === k.parentId);
            return `<tr><td>${k.id}</td><td>${k.name}</td><td>${diffMap[k.difficulty]||k.difficulty}</td><td>${k.orderIndex??0}</td><td>${parent?.name||'-'}</td><td><button class="btn-sm" onclick="editKp(${k.id})">✏️</button><button class="btn-sm danger" onclick="deleteKp(${k.id})">🗑</button></td></tr>`;
        }).join('') + '</tbody></table></div>';
}

async function openKpModal() {
    const cid = document.getElementById('kpCourseSelect').value;
    if (!cid) return toast('请先选择课程');
    document.getElementById('kpModalTitle').textContent = '新增知识点';
    document.getElementById('kpEditId').value = '';
    document.getElementById('kpName').value = '';
    document.getElementById('kpDifficulty').value = 'MEDIUM';
    document.getElementById('kpOrder').value = '1';
    await loadKpParentOptions(cid, null);
    openModal('kpModal');
}
async function editKp(id) {
    const kp = await fetch('/api/knowledge-points/' + id).then(r => r.json());
    const cid = document.getElementById('kpCourseSelect').value;
    document.getElementById('kpModalTitle').textContent = '编辑知识点';
    document.getElementById('kpEditId').value = id;
    document.getElementById('kpName').value = kp.name || '';
    document.getElementById('kpDifficulty').value = kp.difficulty || 'MEDIUM';
    document.getElementById('kpOrder').value = kp.orderIndex ?? 1;
    await loadKpParentOptions(cid, kp.parentId);
    openModal('kpModal');
}
async function loadKpParentOptions(cid, selectedId) {
    const sel = document.getElementById('kpParent');
    sel.innerHTML = '<option value="">无（顶级）</option>';
    const kps = await fetch('/api/knowledge-points/course/' + cid).then(r => r.json());
    kps.forEach(k => {
        sel.innerHTML += `<option value="${k.id}" ${k.id === selectedId ? 'selected' : ''}>${k.name}</option>`;
    });
}
async function saveKp() {
    const cid = document.getElementById('kpCourseSelect').value;
    const body = {
        name: document.getElementById('kpName').value.trim(),
        difficulty: document.getElementById('kpDifficulty').value,
        orderIndex: parseInt(document.getElementById('kpOrder').value) || 1,
        parentId: document.getElementById('kpParent').value ? parseInt(document.getElementById('kpParent').value) : null
    };
    if (!body.name) return toast('请输入知识点名称');
    const id = document.getElementById('kpEditId').value;
    await fetch(id ? '/api/knowledge-points/' + id : '/api/knowledge-points/course/' + cid, {
        method: id ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    closeModal('kpModal'); loadKp(); toast('保存成功');
}
async function deleteKp(id) {
    if (!confirm('确定删除？')) return;
    await fetch('/api/knowledge-points/' + id, { method: 'DELETE' });
    loadKp(); toast('已删除');
}

let allQuestions = [];
let qCurrentCourseId = null;

async function loadQCourseSelect() {
    const courses = await fetch('/api/courses').then(r => r.json());
    document.getElementById('qCourseSelect').innerHTML = '<option value="">-- 选择课程 --</option>' +
        courses.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    loadQuestions();
}
async function loadQuestions() {
    const cid = document.getElementById('qCourseSelect').value;
    if (!cid) {
        document.getElementById('qList').innerHTML = '<div class="empty-state">请先选择课程</div>';
        document.getElementById('qStats').textContent = '';
        return;
    }
    qCurrentCourseId = parseInt(cid);
    allQuestions = await fetch('/api/admin/questions/course/' + cid).then(r => r.json());
    let statsHtml = '';
    try {
        const stats = await fetch('/api/admin/questions/stats/' + cid).then(r => r.json());
        if (stats) {
            const parts = [];
            if (stats.total !== undefined) parts.push(`共 ${stats.total} 题`);
            if (stats.easyCount !== undefined) parts.push(`简单: ${stats.easyCount}`);
            if (stats.mediumCount !== undefined) parts.push(`中等: ${stats.mediumCount}`);
            if (stats.hardCount !== undefined) parts.push(`困难: ${stats.hardCount}`);
            statsHtml = '· ' + parts.join(' · ');
        }
    } catch (e) { }
    document.getElementById('qStats').textContent = statsHtml;

    const typeBadge = { SINGLE: ['单选', 's'], MULTI: ['多选', 'm'], TF: ['判断', 't'], SHORT: ['简答', 'h'] };
    const diffBadge = { EASY: ['简单', 'easy'], MEDIUM: ['中等', 'medium'], HARD: ['困难', 'hard'] };
    document.getElementById('qList').innerHTML = '<div class="table-wrap"><table><thead><tr><th>ID</th><th>题型</th><th>题目</th><th>答案</th><th>难度</th><th>分值</th><th>操作</th></tr></thead><tbody>' +
        allQuestions.map(q => `<tr>
            <td>${q.id}</td>
            <td><span class="badge badge-${(typeBadge[q.type]||['','s'])[1]}">${(typeBadge[q.type]||[q.type])[0]}</span></td>
            <td><span class="truncate" style="max-width:240px" title="${escAttr(q.title||'')}">${q.title||'-'}</span></td>
            <td>${q.answer||'-'}</td>
            <td><span class="badge badge-${(diffBadge[q.difficulty]||['','medium'])[1]}">${(diffBadge[q.difficulty]||[q.difficulty])[0]}</span></td>
            <td>${q.score??0}</td>
            <td><button class="btn-sm" onclick="editQuestion(${q.id})">✏️</button><button class="btn-sm danger" onclick="deleteQuestion(${q.id})">🗑</button></td>
        </tr>`).join('') + '</tbody></table></div>';
}

function escAttr(s) { return (s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function toggleQOptions() {

async function saveQuestion() {
    if (!qCurrentCourseId) return toast('请先选择课程');
    const title = document.getElementById('qTitle').value.trim();
    const answer = document.getElementById('qAnswer').value.trim();
    if (!title) return toast('请输入题目内容');
    if (!answer) return toast('请输入正确答案');

    const type = document.getElementById('qType').value;
    const body = {
        courseId: qCurrentCourseId,
        type: type,
        title: title,
        answer: answer,
        analysis: document.getElementById('qAnalysis').value.trim(),
        score: parseInt(document.getElementById('qScore').value) || 5,
        difficulty: document.getElementById('qDifficulty').value
    };
    if (type === 'SINGLE' || type === 'MULTI') {
        body.optionA = document.getElementById('qOptionA').value.trim();
        body.optionB = document.getElementById('qOptionB').value.trim();
        body.optionC = document.getElementById('qOptionC').value.trim();
        body.optionD = document.getElementById('qOptionD').value.trim();
    }

    const id = document.getElementById('qEditId').value;
    await fetch(id ? '/api/admin/questions/' + id : '/api/admin/questions', {
        method: id ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    closeModal('questionModal'); loadQuestions(); toast('保存成功');
}

async function loadExams() {
    allExams = await fetch('/api/admin/all-exams').then(r => r.json());
    renderExams();
}
function renderExams() {
    const filter = document.getElementById('examStatusFilter').value;
    const filtered = filter ? allExams.filter(e => e.status === filter) : allExams;
    const statusBadge = { COMPLETED: ['已完成', 'done'], IN_PROGRESS: ['进行中', 'pending'], ABANDONED: ['已放弃', 'bad'] };
    document.getElementById('examTableWrap').innerHTML = (filtered.length === 0)
        ? '<div class="empty-state">暂无记录</div>'
        : `<table><thead><tr><th>ID</th><th>用户</th><th>课程</th><th>总分</th><th>得分</th><th>正确/总题</th><th>状态</th><th>开始时间</th><th>结束时间</th><th>操作</th></tr></thead><tbody>` +
          filtered.map(e => {
              const sb = statusBadge[e.status] || [e.status||'-', 'pending'];
              const scoreRatio = e.totalScore ? ((e.userScore||0) / e.totalScore * 100) : 0;
              const scoreColor = scoreRatio >= 80 ? 'var(--success)' : scoreRatio >= 60 ? 'var(--warning)' : 'var(--danger)';
              return `<tr>
                  <td>${e.id}</td>
                  <td>${e.userName||e.userId||'-'}</td>
                  <td>${e.courseName||'-'}</td>
                  <td>${e.totalScore||0}</td>
                  <td style="color:${scoreColor};font-weight:600">${e.userScore||0}</td>
                  <td>${e.correctCount||0}/${e.questionCount||0}</td>
                  <td><span class="badge badge-${sb[1]}">${sb[0]}</span></td>
                  <td>${fmtTime(e.startTime)}</td>
                  <td>${fmtTime(e.endTime)}</td>
                  <td><button class="btn-sm danger" onclick="deleteExam(${e.id})">🗑</button></td>
              </tr>`;
          }).join('') + '</tbody></table>';
}
function fmtTime(t) { return t ? t.substring(0, 16).replace('T', ' ') : '-'; }

async function viewStudentDetail(uid) {

                passedCount: '通过数', failedCount: '未通过数', passRate: '通过率'
            };

            rows.push(`<div class="item"><span class="key">${label}</span><span class="val">${v ?? '-'}</span></div>`);

async function exportData(type) {
    try {
        const data = await fetch('/api/admin/export/' + type).then(r => {
            if (!r.ok) throw new Error('Export failed');
            return r.json();
        });
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = type + '_export_' + new Date().toISOString().substring(0, 10) + '.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        toast('导出成功');
    } catch (e) {
        toast('导出失败');
    }
}

async function loadCourseRequests(){
    const reqs = await fetch('/api/course-request/all').then(r=>r.json());
    const statusMap = {PENDING:'<span class="badge badge-pending">待审批</span>',APPROVED:'<span class="badge badge-done">已批准</span>',REJECTED:'<span class="badge badge-hard">已拒绝</span>'};
    document.querySelector('#creqTable tbody').innerHTML = reqs.map(r=>`<tr>
        <td>${r.id}</td><td>${r.userName||r.userId}</td><td>${r.topic||'-'}</td>
        <td><span class="truncate">${r.description||'-'}</span></td>
        <td>${statusMap[r.status]||r.status}</td><td>${fmtTime(r.createdAt)}</td>
        <td>${r.status==='PENDING'?`<button class="btn-sm accent" onclick="approveRequest(${r.id})">✅ 批准</button>
        <button class="btn-sm danger" onclick="rejectRequest(${r.id})">❌ 拒绝</button>`:''}</td></tr>`).join('');
}

async function approveRequest(id){
    if(!confirm('批准后AI将自动生成课程知识树和考试题库，确认？')) return;
    const btn=event.target; btn.disabled=true; btn.textContent='生成中...';
    try{
        const result=await fetch('/api/course-request/approve/'+id,{method:'POST'}).then(r=>r.json());
        if(result.error){alert(result.error);btn.disabled=false;btn.textContent='批准';return}
        alert('生成成功！课程：'+result.courseName+'，知识点：'+result.kpCount+'个，题目：'+result.questionCount+'题');
        loadCourseRequests(); loadOverview();
    }catch(e){alert('操作失败');btn.disabled=false;btn.textContent='批准'}
}

async function rejectRequest(id){
    if(!confirm('确定拒绝？')) return;
    await fetch('/api/course-request/reject/'+id,{method:'POST'});
    loadCourseRequests();
}

async function loadPendingBadge(){

        if(data.count>0){dot.style.display='inline';dot.title=data.count+'条待审批'}
        else{dot.style.display='none'}
    }catch(e){}
}
